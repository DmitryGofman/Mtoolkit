<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mtoolkit — Mechanical Reference</title>
<style>
  :root {
    --ink: #13181D;
    --surface: #F4F2ED;
    --panel: #FBFAF7;
    --rule: #CBC9C1;
    --layout-blue: #1C5D99;
    --graphite: #6B7077;
    --valid: #3F7D58;
    --caution: #B07A2B;
    --error: #A23B3B;
    --mono: 'Space Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace;
    --sans: -apple-system, 'Segoe UI', Roboto, system-ui, sans-serif;
    --motion: 160ms;
    color-scheme: light;
  }
  html.dark {
    --ink: #E8E9EC;
    --surface: #15191E;
    --panel: #1B2026;
    --rule: #343B43;
    --layout-blue: #5BA3D9;
    --graphite: #9AA2AB;
    --valid: #4F9D6D;
    --caution: #C99240;
    --error: #C25656;
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--surface);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.45;
    min-height: 100vh;
    transition: background var(--motion) ease-out, color var(--motion) ease-out;
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
  .mono, .tabular, input, .val-num {
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
  }
  a { color: var(--layout-blue); }

  /* ---- App shell ---- */
  header.app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 720px;
    margin: 0 auto;
    padding: 16px 20px 0;
  }
  .brand {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .brand small {
    display: block;
    font-size: 12px;
    font-weight: 400;
    color: var(--graphite);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  button.icon-btn {
    min-width: 44px;
    min-height: 44px;
    border-radius: 10px;
    border: 1px solid var(--rule);
    background: var(--panel);
    color: var(--ink);
    cursor: pointer;
    font-size: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  button.icon-btn:hover { border-color: var(--layout-blue); }

  .search-wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 30px 20px 14px;
  }
  .search-field {
    position: relative;
  }
  /* A faint layout-dye index mark on the search field — the "where the
     thumb lands" anchor, drawn like a gauge graduation, not an icon. */
  .search-field::before {
    content: '';
    position: absolute;
    left: 18px; top: 50%;
    width: 3px; height: 26px;
    margin-top: -13px;
    border-radius: 2px;
    background: var(--layout-blue);
    opacity: 0.85;
    pointer-events: none;
  }
  .search-field input {
    width: 100%;
    font-size: 28px;
    padding: 16px 18px 16px 34px;
    border-radius: 14px;
    border: 2px solid var(--rule);
    background: var(--panel);
    color: var(--ink);
    min-height: 66px;
    letter-spacing: -0.01em;
    transition: border-color var(--motion) ease-out, box-shadow var(--motion) ease-out;
  }
  .search-field input::placeholder {
    color: var(--graphite);
    font-family: var(--sans);
    font-size: 18px;
    letter-spacing: 0;
  }
  .search-field input:hover { border-color: color-mix(in srgb, var(--layout-blue) 45%, var(--rule)); }
  .search-field input:focus-visible {
    outline: 2px solid var(--layout-blue);
    outline-offset: 2px;
    border-color: var(--layout-blue);
  }
  .search-hint {
    margin-top: 10px;
    font-size: 13px;
    color: var(--graphite);
    line-height: 1.6;
  }
  .search-hint code {
    font-family: var(--mono);
    background: color-mix(in srgb, var(--layout-blue) 8%, transparent);
    color: var(--layout-blue);
    padding: 1px 5px;
    border-radius: 4px;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 18px;
  }
  .chips-label {
    width: 100%;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--graphite);
    margin-bottom: -2px;
    font-weight: 600;
  }
  .chip {
    min-height: 44px;
    padding: 0 18px;
    border-radius: 999px;
    border: 1px solid var(--rule);
    background: var(--panel);
    color: var(--ink);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    transition: border-color var(--motion) ease-out, color var(--motion) ease-out, background var(--motion) ease-out;
  }
  .chip:hover, .chip:focus-visible { border-color: var(--layout-blue); color: var(--layout-blue); }
  .chip:active { background: color-mix(in srgb, var(--layout-blue) 8%, var(--panel)); }
  .chip[aria-pressed="true"] { border-color: var(--layout-blue); color: var(--layout-blue); background: color-mix(in srgb, var(--layout-blue) 10%, var(--panel)); }

  main#results {
    max-width: 720px;
    margin: 0 auto;
    padding: 8px 20px 80px;
  }

  /* ---- Cards / panels ---- */
  .card {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: 20px 22px 22px;
    margin-bottom: 18px;
  }
  .card h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--graphite);
    margin: 0 0 14px;
    font-weight: 700;
  }
  .module-section > h2 { margin-top: 4px; }
  .card-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin: 0 0 6px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--rule);
  }
  .card-head .badge-key {
    color: var(--ink);
    font-size: 22px;
    font-family: var(--mono);
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .card-head .card-series {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--graphite);
    font-weight: 600;
  }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 480px) { .grid-2 { grid-template-columns: 1fr; } }

  /* ---- Tolerance-callout signature element ---- */
  .callout {
    position: relative;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    margin: 6px 8px 14px 0;
  }
  .callout .dim-line {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .callout .dim-line::before,
  .callout .dim-line::after {
    content: '';
    width: 14px;
    height: 1px;
    background: var(--layout-blue);
    display: inline-block;
    animation: dimDraw 250ms ease-out;
  }
  /* Dimension lines "draw in" from the value outward — a drawing-tool
     flourish that confirms a fresh result, not decoration for its own
     sake. Disabled globally under prefers-reduced-motion (see rule at
     top of stylesheet, which zeroes all animation/transition). */
  .callout .dim-line::before { transform-origin: right center; }
  .callout .dim-line::after { transform-origin: left center; }
  @keyframes dimDraw {
    from { transform: scaleX(0); }
    to { transform: scaleX(1); }
  }
  .callout .dim-box {
    border: 1.5px solid var(--layout-blue);
    border-radius: 6px;
    padding: 6px 12px;
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    background: var(--panel);
    white-space: nowrap;
  }
  .callout .dim-unit {
    font-size: 13px;
    color: var(--graphite);
    font-weight: 400;
    margin-left: 4px;
  }
  .callout .callout-meta {
    margin-top: 4px;
    font-size: 12px;
    color: var(--graphite);
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .callout.callout-error .dim-box { border-color: var(--error); color: var(--error); }
  .callout.callout-error .dim-line::before, .callout.callout-error .dim-line::after { background: var(--error); }

  /* Hero: the ONE bold thing per result — the cited dimension as a
     drawing callout, at the top of the type scale (40px). Everything
     else on the card stays quiet (tabular rows below). */
  .callout-hero { align-items: flex-start; margin: 2px 0 18px; }
  .callout-hero .dim-line { gap: 8px; }
  .callout-hero .dim-line::before { width: 22px; }
  .callout-hero .dim-line::after { width: 22px; }
  .callout-hero .dim-box {
    font-size: 40px;
    padding: 8px 18px;
    border-width: 2px;
    border-radius: 8px;
    letter-spacing: -0.01em;
  }
  .callout-hero .dim-unit { font-size: 16px; }
  .callout-hero .callout-meta { margin-top: 8px; font-size: 13px; }
  .callout-hero .callout-label { font-weight: 600; color: var(--ink); }
  .callout-copy {
    min-height: 28px;
    padding: 0 8px;
    border-radius: 6px;
    border: 1px solid var(--rule);
    background: var(--panel);
    color: var(--graphite);
    cursor: pointer;
    font-size: 12px;
    font-family: var(--sans);
    display: inline-flex;
    align-items: center;
  }
  .callout-copy:hover, .callout-copy:focus-visible { border-color: var(--layout-blue); color: var(--layout-blue); }
  .callout-copy.copied { border-color: var(--valid); color: var(--valid); }

  .callout-row { display: flex; flex-wrap: wrap; gap: 4px 4px; }

  /* One quiet line per card teaching the chip affordance. */
  .source-hint {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--graphite);
    margin: 0 0 14px;
  }
  .source-hint .chip-demo {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px; height: 18px;
    border-radius: 5px;
    background: var(--layout-blue);
    color: #fff;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    flex: none;
  }

  /* ---- Provenance tier chip (compact) ----
     The INLINE badge is a single tier letter A–E in a square layout-blue
     chip — quiet, one per value. Tapping it reveals the full citation in a
     popover (DESIGN_SYSTEM §8). The full title NEVER renders inline. */
  .badge-wrap { position: relative; display: inline-flex; vertical-align: middle; }
  .badge {
    --chip: var(--layout-blue);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px; height: 22px;
    padding: 0;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    line-height: 1;
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
    color: #fff;
    background: var(--chip);
    border: 1px solid color-mix(in srgb, var(--chip) 70%, #000 0%);
    cursor: pointer;
    position: relative;
    transition: transform var(--motion) ease-out, box-shadow var(--motion) ease-out;
  }
  /* Subtle tappable affordance: a tiny "expand" tick at the corner. */
  .badge::after {
    content: '';
    position: absolute;
    right: 2px; bottom: 2px;
    width: 0; height: 0;
    border-left: 3px solid transparent;
    border-bottom: 3px solid rgba(255,255,255,0.55);
  }
  .badge.tier-verified { --chip: var(--valid); }
  .badge.tier-secondary { --chip: var(--layout-blue); }
  .badge.tier-error { --chip: var(--error); }
  .badge:hover { transform: translateY(-1px); box-shadow: 0 1px 4px color-mix(in srgb, var(--chip) 40%, transparent); }
  .badge:focus-visible { outline: 2px solid var(--layout-blue); outline-offset: 2px; }
  .badge[aria-expanded="true"] { box-shadow: 0 0 0 2px color-mix(in srgb, var(--chip) 35%, transparent); }

  .source-detail {
    position: absolute;
    z-index: 30;
    top: calc(100% + 6px);
    left: 0;
    width: max-content;
    max-width: min(320px, 78vw);
    padding: 12px 14px;
    border: 1px solid var(--rule);
    border-left: 3px solid var(--layout-blue);
    background: var(--panel);
    border-radius: 4px 10px 10px 10px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.16);
    font-size: 13px;
    line-height: 1.4;
    color: var(--ink);
    text-align: left;
  }
  /* Flip to the right edge when the chip sits late in a row. */
  .badge-wrap.detail-right .source-detail { left: auto; right: 0; border-radius: 10px 4px 10px 10px; }

  /* Phone-first: on narrow viewports an anchored popover cannot fit beside
     the chip without clipping. Render it as a fixed, viewport-centered card
     with guaranteed >=16px side margins, plus a tap-to-close backdrop. The
     fixed card is positioned relative to the viewport (no ancestor of
     .source-detail establishes a containing block), so a chip anywhere —
     left, center, right, first or last row — opens fully on-screen. */
  .source-detail-backdrop {
    position: fixed;
    inset: 0;
    z-index: 29;
    background: rgba(20, 24, 28, 0.28);
    border: 0;
  }
  .source-detail-backdrop[hidden] { display: none; }
  @media (max-width: 520px) {
    .source-detail {
      position: fixed;
      top: 50%;
      left: 50%;
      right: auto;
      transform: translate(-50%, -50%);
      width: calc(100vw - 32px);
      max-width: 360px;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      border-radius: 10px;
      border-left: 3px solid var(--layout-blue);
      box-shadow: 0 12px 40px rgba(0,0,0,0.32);
    }
    /* Neutralize the right-edge flip on phones — the card is centered. */
    .badge-wrap.detail-right .source-detail {
      left: 50%; right: auto; transform: translate(-50%, -50%);
      border-radius: 10px;
    }
  }
  .source-detail dt { color: var(--graphite); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 8px; font-weight: 600; }
  .source-detail dt:first-child { margin-top: 0; }
  .source-detail dd { margin: 2px 0 0; font-family: var(--mono); font-size: 12.5px; }
  .source-detail dd.dd-prose { font-family: var(--sans); font-size: 12.5px; color: var(--graphite); }
  .source-detail[hidden] { display: none; }

  /* ---- value rows for table-like data ----
     Two columns only: label → value(+unit)+tier chip. The separate
     SOURCE column is gone; the chip rides the value. */
  .val-table { width: 100%; border-collapse: collapse; }
  .val-table th {
    text-align: left;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--graphite);
    padding: 0 0 8px 0;
    border-bottom: 1px solid var(--rule);
    font-weight: 600;
  }
  .val-table th.col-val { text-align: right; }
  .val-table td {
    padding: 11px 0;
    border-bottom: 1px solid var(--rule);
    vertical-align: middle;
  }
  .val-table td.td-label { color: var(--ink); font-size: 14px; padding-right: 12px; }
  .val-table td.td-val { text-align: right; white-space: nowrap; }
  .val-table tr:last-child td { border-bottom: none; }
  .val-table tbody tr { transition: background var(--motion) ease-out; }
  .val-table tbody tr:hover { background: color-mix(in srgb, var(--layout-blue) 4%, transparent); }

  .val-cell { display: inline-flex; align-items: baseline; gap: 6px; justify-content: flex-end; }
  .val-num { font-size: 16px; font-weight: 700; }
  .val-unit { font-size: 12px; color: var(--graphite); margin-left: 1px; }
  .val-cell .badge-wrap { align-self: center; }

  .no-value {
    color: var(--error);
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    justify-content: flex-end;
  }
  .no-value-block {
    color: var(--error);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border: 1px dashed var(--error);
    border-radius: 8px;
    background: color-mix(in srgb, var(--error) 5%, transparent);
  }

  /* ---- forms ---- */
  label { display: block; font-size: 13px; color: var(--graphite); margin-bottom: 4px; }
  select, input[type="text"], input[type="number"] {
    width: 100%;
    min-height: 44px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--rule);
    background: var(--panel);
    color: var(--ink);
    font-size: 16px;
  }
  select:focus-visible, input:focus-visible {
    outline: 2px solid var(--layout-blue);
    outline-offset: 1px;
  }
  fieldset { border: none; padding: 0; margin: 0 0 12px; }
  .field { margin-bottom: 12px; }
  .radio-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .radio-chip {
    min-height: 44px;
    padding: 0 14px;
    border-radius: 8px;
    border: 1px solid var(--rule);
    background: var(--panel);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  .radio-chip input { width: auto; min-height: auto; margin: 0; }
  .radio-chip:has(input:checked) { border-color: var(--layout-blue); color: var(--layout-blue); }

  button.primary {
    min-height: 48px;
    padding: 0 18px;
    border-radius: 10px;
    border: none;
    background: var(--layout-blue);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .empty-state, .nomatch-state {
    text-align: center;
    padding: 44px 16px 36px;
    color: var(--graphite);
  }
  /* Blueprint-grid texture on the home/empty state only — a faint
     drafting-table graduation, not a pattern for its own sake.
     Static (no animation) so it costs nothing under reduced motion. */
  .empty-state {
    border-radius: 14px;
    background-image:
      linear-gradient(color-mix(in srgb, var(--layout-blue) 7%, transparent) 1px, transparent 1px),
      linear-gradient(90deg, color-mix(in srgb, var(--layout-blue) 7%, transparent) 1px, transparent 1px);
    background-size: 24px 24px;
    background-position: center top;
  }
  .caliper-motif-wrap { width: 148px; margin: 0 auto 14px; }
  .caliper-motif { width: 100%; height: auto; display: block; }
  .empty-state .es-mark, .nomatch-state .es-mark {
    width: 40px; height: 40px;
    margin: 0 auto 16px;
    border: 1.5px solid var(--layout-blue);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--layout-blue);
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
  }
  .nomatch-state .es-mark { border-color: var(--caution); color: var(--caution); }
  .empty-state .es-title, .nomatch-state .es-title {
    font-size: 16px;
    color: var(--ink);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .empty-state .es-sub, .nomatch-state .es-sub { font-size: 13.5px; }
  .empty-state .examples, .nomatch-state .examples {
    margin-top: 18px;
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .example-btn {
    min-height: 44px;
    padding: 0 16px;
    border-radius: 8px;
    border: 1px dashed color-mix(in srgb, var(--layout-blue) 50%, var(--rule));
    background: transparent;
    color: var(--layout-blue);
    font-family: var(--mono);
    font-size: 14px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    transition: background var(--motion) ease-out, border-color var(--motion) ease-out;
  }
  .example-btn:hover, .example-btn:focus-visible {
    border-style: solid;
    background: color-mix(in srgb, var(--layout-blue) 9%, transparent);
  }

  .module-section { margin-bottom: 22px; }
  .module-section:last-child { margin-bottom: 0; }

  /* ---- Beam diagram (headline motion feature) ----
     Symbols only (L, δ, P/w) — the real cited deflection stays in the
     badged hero callout / table. The path bend is animated in JS
     (rAF), not CSS, so it can tween between differently-shaped curves;
     everything else here is static SVG styling. */
  .beam-diagram { margin: 2px 0 16px; max-width: 420px; }
  .beam-diagram .beam-svg { width: 100%; height: auto; display: block; }
  .beam-symbol { font-family: var(--mono); font-weight: 700; }

  /* ---- Thread cross-section schematic ----
     A small 60°-V thread-profile diagram reinforcing the tolerance-
     callout identity. Dimension labels are symbols (d, d₂, d₁, P)
     only — no uncited numbers ever render inside this SVG. */
  .thread-schematic { margin: 2px 0 16px; max-width: 280px; }
  .thread-schematic .thread-svg { width: 100%; height: auto; display: block; }
  .thread-symbol { font-family: var(--mono); font-weight: 700; }
  .formula-box {
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.55;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-left: 3px solid color-mix(in srgb, var(--layout-blue) 45%, var(--rule));
    border-radius: 8px;
    padding: 11px 13px;
    color: var(--graphite);
    overflow-x: auto;
    margin-top: 12px;
  }

  footer.app-footer {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 20px 60px;
    font-size: 12px;
    color: var(--graphite);
    text-align: center;
  }
  footer.app-footer::before {
    content: '';
    display: block;
    width: 48px;
    height: 1px;
    background: var(--rule);
    margin: 0 auto 18px;
  }

  /* Dark mode: popover/shadows quieter & sharper, not cinematic. */
  html.dark .source-detail { box-shadow: 0 6px 22px rgba(0,0,0,0.45); }
  html.dark .source-detail-backdrop { background: rgba(0,0,0,0.5); }
  @media (max-width: 520px) {
    html.dark .source-detail { box-shadow: 0 12px 40px rgba(0,0,0,0.6); }
  }
  html.dark .card { box-shadow: none; }

<script>
/* @pure-start */
const MTK = (function () {
  'use strict';

  const dataVersion = '0.1.0';

  /* ============================================================
   * 1. SOURCE REGISTRY — SOURCES.md §4, verbatim structure.
   *    Records reference sourceId only; never inline a full title.
   * ============================================================ */
  const sourceRegistry = {
    SRC001: { title: 'ISO 261',       authority: 'ISO',   type: 'Standard', tier: 'A', status: 'Pending Access',      usedBy: ['Threads', 'TapDrill'] },
    SRC002: { title: 'ISO 965-1',     authority: 'ISO',   type: 'Standard', tier: 'A', status: 'Pending Access',      usedBy: ['Threads'] },
    SRC003: { title: 'ISO 68-1',      authority: 'ISO',   type: 'Standard', tier: 'A', status: 'Pending Access',      usedBy: ['Threads'] },
    SRC004: { title: "Machinery's Handbook 30th", authority: 'Industrial Press', type: 'Handbook', tier: 'B', status: 'Available', usedBy: ['Threads', 'TapDrill', 'Clearance', 'Conversion'] },
    SRC005: { title: 'ASME B1.1',     authority: 'ASME',  type: 'Standard', tier: 'A', status: 'Pending Access',      usedBy: ['Threads'] },

    SRC008: { title: "Roark's Formulas for Stress and Strain", authority: 'McGraw-Hill', type: 'Reference', tier: 'B', status: 'Available', usedBy: ['BeamCalc'] },
    SRC009: { title: 'NIST SP 811 (SI units & conversion factors)', authority: 'NIST', type: 'Standard', tier: 'A', status: 'Publicly Available', usedBy: ['Conversion'] }
  };

  /* ============================================================
   * 2. PROVENANCE HELPER — SOURCES.md §5 schema.
   * ============================================================ */
  function prov(sourceId, confidenceTier, verificationStatus, extra) {
    const base = { sourceId: sourceId, confidenceTier: confidenceTier, verificationStatus: verificationStatus };
    if (extra) {
      for (const k in extra) {
        if (Object.prototype.hasOwnProperty.call(extra, k)) base[k] = extra[k];
      }
    }
    return base;
  }

  /* ============================================================
   * 3. THREAD DATA
   *    Derived from the ISO 68-1 / ASME B1.1 60°-V basic profile —
   *    not a copied table (SOURCES §7 licensing rule).
   *
   *    pitchDia = majorDia − PITCH_DIA_OFFSET · P
   *    minorDia = majorDia − MINOR_DIA_OFFSET · P
   *    (P = thread pitch in the same unit as majorDia; for Unified
   *    threads P = 1/TPI inches.)
   *
   *    These two constants are the basic ISO 68-1 / 60°-V profile
   *    constants and must be used exactly — a looser/rounded value
   *    drifts the last digit of derived diameters (PROJECT_MEMORY.md:
   *    M6 coarse must read pitchDia 5.350 / minorDia 4.917 mm exactly).
   * ============================================================ */
  const PITCH_DIA_OFFSET = 0.649519;  // H/2 normalized: 0.649519 * P
  const MINOR_DIA_OFFSET = 1.082532;  // 5H/8 normalized: 1.082532 * P

  function round(value, dp) {
    const f = Math.pow(10, dp);
    return Math.round((value + Number.EPSILON) * f) / f;
  }

  function threadProv(system) {
    return prov('SRC004', 'B', 'Verified Against Secondary', {
      unitSystem: system,
      convention: system === 'metric'
        ? 'ISO 261 (sizes) / ISO 965-1 (tolerances) / ISO 68-1 (basic profile); cross-checked against Machinery\'s Handbook 30th'
        : 'ASME B1.1 (Unified inch screw threads, basic profile); cross-checked against Machinery\'s Handbook 30th',
      notes: 'Primary standard (' + (system === 'metric' ? 'SRC001/002/003' : 'SRC005') + ') access is pending; values derived from the basic 60°-V profile formula and verified against the secondary handbook, not yet against the primary standard text.'
    });
  }

  function makeMetricThread(sizeKey, majorDia, pitch, series) {
    const p = pitch;
    return {
      sizeKey: sizeKey,
      label: sizeKey + ' × ' + p,
      system: 'metric',
      series: series,
      majorDia: majorDia,
      pitch: p,
      pitchDia: round(majorDia - PITCH_DIA_OFFSET * p, 3),
      minorDia: round(majorDia - MINOR_DIA_OFFSET * p, 3),
      unit: 'mm',
      provenance: threadProv('metric')
    };
  }

  function makeUnifiedThread(sizeKey, majorDia, tpi, series) {
    const p = 1 / tpi;
    return {
      sizeKey: sizeKey,
      label: sizeKey,
      system: 'unified',
      series: series,
      majorDia: majorDia,
      pitch: round(p, 5),
      tpi: tpi,
      pitchDia: round(majorDia - PITCH_DIA_OFFSET * p, 4),
      minorDia: round(majorDia - MINOR_DIA_OFFSET * p, 4),
      unit: 'in',
      provenance: threadProv('unified')
    };
  }

  const threads = [
    // --- Metric coarse, M1.6–M24 (SPEC §5.1 band) ---
    makeMetricThread('M1.6', 1.6, 0.35, 'coarse'),
    makeMetricThread('M2',   2,   0.4,  'coarse'),
    makeMetricThread('M2.5', 2.5, 0.45, 'coarse'),
    makeMetricThread('M3',   3,   0.5,  'coarse'),
    makeMetricThread('M4',   4,   0.7,  'coarse'),
    makeMetricThread('M5',   5,   0.8,  'coarse'),
    makeMetricThread('M6',   6,   1.0,  'coarse'),
    makeMetricThread('M8',   8,   1.25, 'coarse'),
    makeMetricThread('M10',  10,  1.5,  'coarse'),
    makeMetricThread('M12',  12,  1.75, 'coarse'),
    makeMetricThread('M14',  14,  2.0,  'coarse'),
    makeMetricThread('M16',  16,  2.0,  'coarse'),
    makeMetricThread('M20',  20,  2.5,  'coarse'),
    makeMetricThread('M24',  24,  3.0,  'coarse'),

    // --- Metric fine, common pitches only (SPEC §5.1: "common fine") ---
    makeMetricThread('M8',  8,  1.0,  'fine'),
    makeMetricThread('M10', 10, 1.25, 'fine'),
    makeMetricThread('M10', 10, 1.0,  'fine'),
    makeMetricThread('M12', 12, 1.25, 'fine'),
    makeMetricThread('M14', 14, 1.5,  'fine'),
    makeMetricThread('M16', 16, 1.5,  'fine'),
    makeMetricThread('M20', 20, 1.5,  'fine'),
    makeMetricThread('M24', 24, 2.0,  'fine'),

    // --- Unified UNC/UNF, #4–1/2" (SPEC §5.1 band) ---
    makeUnifiedThread('#4-40',  0.1120, 40, 'UNC'),
    makeUnifiedThread('#4-48',  0.1120, 48, 'UNF'),
    makeUnifiedThread('#6-32',  0.1380, 32, 'UNC'),
    makeUnifiedThread('#6-40',  0.1380, 40, 'UNF'),
    makeUnifiedThread('#8-32',  0.1640, 32, 'UNC'),
    makeUnifiedThread('#8-36',  0.1640, 36, 'UNF'),
    makeUnifiedThread('#10-24', 0.1900, 24, 'UNC'),
    makeUnifiedThread('#10-32', 0.1900, 32, 'UNF'),
    makeUnifiedThread('1/4-20', 0.2500, 20, 'UNC'),
    makeUnifiedThread('1/4-28', 0.2500, 28, 'UNF'),
    makeUnifiedThread('5/16-18',0.3125, 18, 'UNC'),
    makeUnifiedThread('5/16-24',0.3125, 24, 'UNF'),
    makeUnifiedThread('3/8-16', 0.3750, 16, 'UNC'),
    makeUnifiedThread('3/8-24', 0.3750, 24, 'UNF'),
    makeUnifiedThread('7/16-14',0.4375, 14, 'UNC'),
    makeUnifiedThread('7/16-20',0.4375, 20, 'UNF'),
    makeUnifiedThread('1/2-13', 0.5000, 13, 'UNC'),
    makeUnifiedThread('1/2-20', 0.5000, 20, 'UNF')
  ];

  /* ============================================================
   * 4. TAP DRILL RULE — SPEC §5.2 / SOURCES §6.
   *    ~75% engagement: drill = majorDia − P
   *    ~50% engagement: drill = majorDia − PITCH_DIA_OFFSET·P
   *      (the ~50% hole sits at the theoretical pitch diameter)
   * ============================================================ */
  function tapDrill(thread) {
    if (!thread || typeof thread.majorDia !== 'number' || typeof thread.pitch !== 'number') {
      return {
        result: null,
        formula: null,
        source: null,
        notes: 'No verified value: thread record incomplete.'
      };
    }
    const dp = thread.unit === 'in' ? 4 : 2;
    const pct75 = round(thread.majorDia - thread.pitch, dp);
    const pct50 = round(thread.majorDia - PITCH_DIA_OFFSET * thread.pitch, dp);
    return {
      result: {
        pct75: pct75,
        pct50: pct50,
        unit: thread.unit,
        sizeKey: thread.sizeKey,
        series: thread.series
      },
      formula: '~75% engagement: drill = majorDia − P  |  ~50% engagement: drill = majorDia − 0.649519·P',
      source: prov('SRC004', 'B', 'Verified Against Secondary', {
        unitSystem: thread.system,
        convention: '~75% and ~50% thread engagement, metric rule per Machinery\'s Handbook 30th',
        notes: 'Harder materials (e.g. stainless, titanium) should use the ~50% engagement column to reduce tap breakage risk; softer materials (aluminum, brass) commonly tap at ~75%. This is a starting reference, not a substitute for shop practice.'
      })
    };
  }

  /* ============================================================
   * 5. CLEARANCE HOLES — SPEC §5.3 / SOURCES §6.
   *    Derived/used values only (not the full standard table),
   *    per SOURCES §7 licensing rule.
   * ============================================================ */
  function clearanceProvMetric() {
    return prov('SRC006', 'B', 'Verified Against Secondary', {
      unitSystem: 'metric',
      convention: 'ISO 273 clearance hole fit classes: close / medium(normal) / coarse(loose); cross-checked against Machinery\'s Handbook 30th',
      notes: 'Primary standard (SRC006) access is pending; figures verified against the secondary handbook (SRC004), not yet against the primary ISO text.'
    });
  }

  function clearanceProvImperial() {
    return prov('SRC007', 'B', 'Verified Against Secondary', {
      unitSystem: 'imperial',
      convention: 'ASME B18.2.8 clearance hole fit classes: close / normal / loose; cross-checked against Machinery\'s Handbook 30th',
      notes: 'Primary standard (SRC007) access is pending; figures verified against the secondary handbook (SRC004), not yet against the primary ASME text. Number sizes #4–#8 are not yet confidently sourced and are intentionally omitted rather than guessed.'
    });
  }

  // ISO 273 subset, mm (close / normal / loose), M1.6–M24
  const clearanceMetric = {
    'M1.6': { close: 1.7,  normal: 1.8,  loose: 2.0 },
    'M2':   { close: 2.2,  normal: 2.4,  loose: 2.6 },
    'M2.5': { close: 2.7,  normal: 2.9,  loose: 3.1 },
    'M3':   { close: 3.2,  normal: 3.4,  loose: 3.6 },
    'M4':   { close: 4.3,  normal: 4.5,  loose: 4.8 },
    'M5':   { close: 5.3,  normal: 5.5,  loose: 5.8 },
    'M6':   { close: 6.4,  normal: 6.6,  loose: 7.0 },
    'M8':   { close: 8.4,  normal: 9.0,  loose: 10.0 },
    'M10':  { close: 10.5, normal: 11.0, loose: 12.0 },
    'M12':  { close: 13.0, normal: 13.5, loose: 14.5 },
    'M14':  { close: 15.0, normal: 15.5, loose: 16.5 },
    'M16':  { close: 17.0, normal: 17.5, loose: 18.5 },
    'M20':  { close: 21.0, normal: 22.0, loose: 24.0 },
    'M24':  { close: 25.0, normal: 26.0, loose: 28.0 }
  };

  // ASME B18.2.8 subset, decimal inch (close / normal / loose).
  // Number sizes #4–#8 intentionally absent: not confidently sourced
  // (SPEC §6 failure philosophy — no verified value, no guess).
  const clearanceImperial = {
    '#10': { close: 0.196, normal: 0.201, loose: 0.221 },
    '1/4': { close: 0.266, normal: 0.281, loose: 0.297 },
    '5/16':{ close: 0.328, normal: 0.344, loose: 0.359 },
    '3/8': { close: 0.391, normal: 0.406, loose: 0.422 },
    '7/16':{ close: 0.453, normal: 0.469, loose: 0.484 },
    '1/2': { close: 0.531, normal: 0.547, loose: 0.562 }
  };

  function clearanceFor(sizeKey, system) {
    const table = system === 'metric' ? clearanceMetric : clearanceImperial;
    const row = table[sizeKey];
    if (!row) {
      return {
        unit: system === 'metric' ? 'mm' : 'in',
        close: null, normal: null, loose: null,
        source: null,
        notes: 'No verified value for "' + sizeKey + '" (' + system + '). Not guessed — see SPEC §6 failure philosophy.'
      };
    }
    return {
      unit: system === 'metric' ? 'mm' : 'in',
      close: row.close,
      normal: row.normal,
      loose: row.loose,
      source: system === 'metric' ? clearanceProvMetric() : clearanceProvImperial()
    };
  }

  /* ============================================================
   * 6. UNIT CONVERSION — SPEC §5.4 / SOURCES §6.
   *    Factors are exact-by-definition where applicable (tier A,
   *    Verified Against Primary, SRC009 NIST SP 811). Only the
   *    conversion factors themselves earn tier A in this dataset.
   * ============================================================ */
  function conversionProv(notes) {
    return prov('SRC009', 'A', 'Verified Against Primary', {
      unitSystem: 'both',
      convention: 'SI base-unit conversion factor, exact by definition (NIST SP 811)',
      notes: notes || 'Cross-checked against Machinery\'s Handbook 30th (SRC004).'
    });
  }

  // Each category: { baseUnit, units: { key: { label, toBase (factor to SI base), source } } }
  const categories = {
    length: {
      baseUnit: 'm',
      units: {
        m:  { label: 'meter',      toBase: 1,                 source: conversionProv('SI base unit; toBase = 1 by definition.') },
        mm: { label: 'millimeter', toBase: 0.001,              source: conversionProv('1 mm = 0.001 m, SI prefix, exact by definition.') },
        cm: { label: 'centimeter', toBase: 0.01,               source: conversionProv('1 cm = 0.01 m, SI prefix, exact by definition.') },
        in: { label: 'inch',       toBase: 0.0254,             source: conversionProv('1 in = 0.0254 m exactly (international inch, NIST SP 811).') },
        ft: { label: 'foot',       toBase: 0.3048,             source: conversionProv('1 ft = 0.3048 m exactly (international foot, NIST SP 811).') }
      }
    },
    force: {
      baseUnit: 'N',
      units: {
        N:   { label: 'newton',     toBase: 1,                 source: conversionProv('SI base unit; toBase = 1 by definition.') },
        kN:  { label: 'kilonewton', toBase: 1000,               source: conversionProv('1 kN = 1000 N, SI prefix, exact by definition.') },
        lbf: { label: 'pound-force',toBase: 4.4482216152605,    source: conversionProv('1 lbf = 4.4482216152605 N exactly (defined via g_n = 9.80665 m/s^2 and 1 lb = 0.45359237 kg, NIST SP 811).') },
        kgf: { label: 'kilogram-force', toBase: 9.80665,        source: conversionProv('1 kgf = 9.80665 N exactly (standard gravity g_n, NIST SP 811).') }
      }
    },
    torque: {
      baseUnit: 'N·m',
      units: {
        'N·m':   { label: 'newton-meter',   toBase: 1,             source: conversionProv('SI base unit; toBase = 1 by definition.') },
        'N·mm':  { label: 'newton-millimeter', toBase: 0.001,      source: conversionProv('1 N·mm = 0.001 N·m, SI prefix, exact by definition.') },
        'lbf·ft':{ label: 'pound-foot',     toBase: 1.3558179483314004, source: conversionProv('1 lbf·ft = 1 lbf × 1 ft = 4.4482216152605 N × 0.3048 m, exact by definition.') },
        'lbf·in':{ label: 'pound-inch',     toBase: 0.1129848290276167, source: conversionProv('1 lbf·in = 1 lbf × 1 in = 4.4482216152605 N × 0.0254 m, exact by definition.') }
      }
    },
    pressure: {
      baseUnit: 'Pa',
      units: {
        Pa:  { label: 'pascal',     toBase: 1,                 source: conversionProv('SI base unit; toBase = 1 by definition.') },
        kPa: { label: 'kilopascal', toBase: 1000,               source: conversionProv('1 kPa = 1000 Pa, SI prefix, exact by definition.') },
        MPa: { label: 'megapascal', toBase: 1000000,            source: conversionProv('1 MPa = 1,000,000 Pa, SI prefix, exact by definition.') },
        psi: { label: 'pound-force per sq in', toBase: 6894.757293168, source: conversionProv('1 psi = 1 lbf / 1 in^2 = 4.4482216152605 N / 0.0254^2 m^2, exact by definition (NIST SP 811).') },
        bar: { label: 'bar',        toBase: 100000,             source: conversionProv('1 bar = 100,000 Pa exactly, by definition (NIST SP 811).') }
      }
    },
    mass: {
      baseUnit: 'kg',
      units: {
        kg: { label: 'kilogram', toBase: 1,                    source: conversionProv('SI base unit; toBase = 1 by definition.') },
        g:  { label: 'gram',     toBase: 0.001,                 source: conversionProv('1 g = 0.001 kg, SI prefix, exact by definition.') },
        lb: { label: 'pound (avoirdupois)', toBase: 0.45359237, source: conversionProv('1 lb = 0.45359237 kg exactly (international avoirdupois pound, NIST SP 811).') },
        oz: { label: 'ounce',    toBase: 0.028349523125,        source: conversionProv('1 oz = 1/16 lb = 0.45359237/16 kg exactly, by definition.') }
      }
    }
  };

  function convert(value, from, to, category) {
    const cat = categories[category];
    if (!cat || !cat.units[from] || !cat.units[to]) {
      return {
        result: null,
        source: null,
        notes: 'No verified value: unknown unit/category combination (' + category + ': ' + from + ' -> ' + to + ').'
      };
    }
    const fromUnit = cat.units[from];
    const toUnit = cat.units[to];
    const result = value * fromUnit.toBase / toUnit.toBase;
    return {
      result: result,
      unit: to,
      formula: 'value × (' + from + '→' + cat.baseUnit + ' factor) ÷ (' + to + '→' + cat.baseUnit + ' factor)',
      source: toUnit.source
    };
  }

  // Temperature is affine, not a pure scale factor — handled separately.
  function convertTemp(value, from, to) {
    const valid = { C: 1, F: 1, K: 1 };
    if (!valid[from] || !valid[to]) {
      return { result: null, source: null, notes: 'No verified value: unknown temperature unit.' };
    }
    // Normalize to Celsius first.
    let celsius;
    if (from === 'C') celsius = value;
    else if (from === 'F') celsius = (value - 32) * (5 / 9);
    else if (from === 'K') celsius = value - 273.15;

    let result;
    if (to === 'C') result = celsius;
    else if (to === 'F') result = celsius * (9 / 5) + 32;
    else if (to === 'K') result = celsius + 273.15;

    return {
      result: result,
      unit: to,
      formula: 'affine conversion via Celsius: F = C×9/5+32, K = C+273.15',
      source: conversionProv('Temperature scale relationships are exact by definition (ITS-90 / NIST SP 811): K = °C + 273.15; °F = °C×9/5 + 32.')
    };
  }

  /* ============================================================
   * 7. MATERIALS — Young's modulus library for the beam calc
   *    (SPEC §5.5). Values per Roark's Formulas for Stress and
   *    Strain / standard handbook references (SRC008).
   * ============================================================ */
  function materialProv(notes) {
    return prov('SRC008', 'B', 'Verified Against Secondary', {
      unitSystem: 'both',
      convention: 'Young\'s modulus (E), representative handbook value for the named material/temper',
      notes: notes || 'Representative value; real material lots vary — cross-checked against Machinery\'s Handbook 30th (SRC004).'
    });
  }

  const materials = [
    { key: 'steel_structural', label: 'Structural steel',        E: 200e9, unit: 'Pa', source: materialProv('Typical structural/mild carbon steel.') },
    { key: 'stainless_304',    label: 'Stainless steel 304',     E: 193e9, unit: 'Pa', source: materialProv('Austenitic stainless, annealed.') },
    { key: 'aluminum_6061',    label: 'Aluminium 6061',          E: 69e9,  unit: 'Pa', source: materialProv('Common wrought aluminum alloy, any temper (E is temper-insensitive).') },
    { key: 'titanium_ti6al4v', label: 'Titanium Ti-6Al-4V',      E: 114e9, unit: 'Pa', source: materialProv('Grade 5 titanium alloy, mill-annealed.') },
    { key: 'brass',            label: 'Brass',                   E: 100e9, unit: 'Pa', source: materialProv('Typical wrought brass (Cu-Zn alloy).') },
    { key: 'cast_iron_grey',   label: 'Cast iron (grey)',        E: 100e9, unit: 'Pa', source: materialProv('Grey cast iron; E varies more with grade than other metals here.') }
  ];

  // Provenance for the App-Developer's beam() formula result (Euler–Bernoulli, Roark).
  const beamSource = prov('SRC008', 'B', 'Verified Against Secondary', {
    unitSystem: 'both',
    convention: 'Euler–Bernoulli cantilever beam theory, formulas per Roark\'s Formulas for Stress and Strain',
    notes: 'Standard small-deflection linear beam theory; cross-checked against Machinery\'s Handbook 30th (SRC004). Not valid for large deflections or non-linear material response.'
  });

  /* ============================================================
   * 8. BEAM CALCULATOR — cantilever, Euler–Bernoulli (SPEC §5.5).
   *    Pure function: f(inputs) -> {result, formula, source}|{error}
   * ============================================================ */
  function beam(inp) {
    if (!inp || typeof inp !== 'object') {
      return { error: 'Invalid input.' };
    }
    const length = inp.length;
    const E = inp.E;
    const section = inp.section;
    const load = inp.load;
    const magnitude = inp.magnitude;

    if (typeof length !== 'number' || !(length > 0)) {
      return { error: 'Enter a length greater than 0.' };
    }
    if (typeof E !== 'number' || !(E > 0)) {
      return { error: 'Enter a modulus of elasticity (E) greater than 0.' };
    }
    if (typeof magnitude !== 'number' || !(magnitude > 0)) {
      return { error: 'Enter a load magnitude greater than 0.' };
    }
    if (load !== 'point' && load !== 'udl') {
      return { error: 'Choose a load type: point or udl.' };
    }
    if (!section || (section.type !== 'rect' && section.type !== 'round')) {
      return { error: 'Choose a section: rect or round.' };
    }

    let I, c;
    if (section.type === 'rect') {
      const b = section.b, h = section.h;
      if (typeof b !== 'number' || !(b > 0) || typeof h !== 'number' || !(h > 0)) {
        return { error: 'Enter rect section b and h greater than 0.' };
      }
      I = (b * Math.pow(h, 3)) / 12;
      c = h / 2;
    } else {
      const d = section.d;
      if (typeof d !== 'number' || !(d > 0)) {
        return { error: 'Enter round section d greater than 0.' };
      }
      I = (Math.PI * Math.pow(d, 4)) / 64;
      c = d / 2;
    }

    let deflection, moment, formula;
    if (load === 'point') {
      const P = magnitude;
      deflection = (P * Math.pow(length, 3)) / (3 * E * I);
      moment = P * length;
      formula = 'Point load (tip): δ = PL³/3EI, M = PL';
    } else {
      const W = magnitude;
      const w = W / length;
      deflection = (w * Math.pow(length, 4)) / (8 * E * I);
      moment = (w * Math.pow(length, 2)) / 2;
      formula = 'UDL (total W): w = W/L, δ = wL⁴/8EI, M = wL²/2';
    }
    const stress = (moment * c) / I;

    return {
      result: {
        I: I,
        c: c,
        deflection: deflection,
        moment: moment,
        stress: stress
      },
      formula: formula + '; σ = Mc/I' + (section.type === 'rect' ? ' (I = bh³/12, c = h/2)' : ' (I = πd⁴/64, c = d/2)'),
      source: beamSource
    };
  }

  /* ============================================================
   * 8b. BEAM SHAPE HELPER — pure geometry, DOM-free.
   *    Returns the NORMALIZED cantilever deflection curve as an
   *    array of [x, y] points, x and y both in 0..1 (fraction of
   *    length / fraction of max deflection). This is a shape
   *    helper for the visual diagram only — it carries no engineering
   *    value and is never rendered as a cited number. The real,
   *    cited deflection continues to come from beam() above.
   *
   *    Point load (tip):  y(x) ∝ x²(3L − x)
   *    UDL (total):       y(x) ∝ x²(6L² − 4Lx + x²)
   *    (L = 1 here; normalized so y(1) = 1, i.e. the tip is always
   *    the visual maximum — the caller scales that to a fixed
   *    fraction of the drawn beam length so the bend stays visible
   *    regardless of the true magnitude.)
   * ============================================================ */
  function beamShapeRaw(load, x) {
    return load === 'udl'
      ? x * x * (6 - 4 * x + x * x)
      : x * x * (3 - x);
  }

  function beamShape(load, n) {
    const steps = (typeof n === 'number' && n > 0) ? Math.round(n) : 24;
    const kind = load === 'udl' ? 'udl' : 'point';
    const maxRaw = beamShapeRaw(kind, 1);
    const pts = [];
    for (let i = 0; i <= steps; i++) {
      const x = i / steps;
      const y = maxRaw > 0 ? beamShapeRaw(kind, x) / maxRaw : 0;
      pts.push([x, y]);
    }
    return pts;
  }

  /* ============================================================
   * 9. THREAD LOOKUP HELPER — return matching thread records,
   *    coarse first, optionally filtered by pitch.
   * ============================================================ */
  function threadsFor(sizeKey, system, pitch) {
    if (!sizeKey) return [];
    let matches = threads.filter(function (t) {
      if (t.sizeKey !== sizeKey) return false;
      if (system && t.system !== system) return false;
      return true;
    });
    if (pitch !== undefined && pitch !== null) {
      matches = matches.filter(function (t) {
        return Math.abs(t.pitch - pitch) < 1e-6;
      });
    }
    matches.sort(function (a, b) {
      const aCoarse = a.series === 'coarse' || a.series === 'UNC';
      const bCoarse = b.series === 'coarse' || b.series === 'UNC';
      if (aCoarse && !bCoarse) return -1;
      if (!aCoarse && bCoarse) return 1;
      return 0;
    });
    return matches;
  }

  /* ============================================================
   * 10. UNIT TOKEN MAPPING — alias -> {category, canonical}.
   * ============================================================ */
  const UNIT_ALIASES = {
    // length
    'mm': { category: 'length', canonical: 'mm' },
    'millimeter': { category: 'length', canonical: 'mm' },
    'millimeters': { category: 'length', canonical: 'mm' },
    'millimetre': { category: 'length', canonical: 'mm' },
    'cm': { category: 'length', canonical: 'cm' },
    'centimeter': { category: 'length', canonical: 'cm' },
    'centimeters': { category: 'length', canonical: 'cm' },
    'm': { category: 'length', canonical: 'm' },
    'meter': { category: 'length', canonical: 'm' },
    'meters': { category: 'length', canonical: 'm' },
    'metre': { category: 'length', canonical: 'm' },
    'in': { category: 'length', canonical: 'in' },
    'inch': { category: 'length', canonical: 'in' },
    'inches': { category: 'length', canonical: 'in' },
    '"': { category: 'length', canonical: 'in' },
    "''": { category: 'length', canonical: 'in' },
    'ft': { category: 'length', canonical: 'ft' },
    'foot': { category: 'length', canonical: 'ft' },
    'feet': { category: 'length', canonical: 'ft' },
    "'": { category: 'length', canonical: 'ft' },
    // force
    'n': { category: 'force', canonical: 'N' },
    'newton': { category: 'force', canonical: 'N' },
    'newtons': { category: 'force', canonical: 'N' },
    'kn': { category: 'force', canonical: 'kN' },
    'kilonewton': { category: 'force', canonical: 'kN' },
    'lbf': { category: 'force', canonical: 'lbf' },
    'lb-f': { category: 'force', canonical: 'lbf' },
    'poundforce': { category: 'force', canonical: 'lbf' },
    'kgf': { category: 'force', canonical: 'kgf' },
    // torque
    'n·m': { category: 'torque', canonical: 'N·m' },
    'nm': { category: 'torque', canonical: 'N·m' },
    'n-m': { category: 'torque', canonical: 'N·m' },
    'n·mm': { category: 'torque', canonical: 'N·mm' },
    'nmm': { category: 'torque', canonical: 'N·mm' },
    'lbf·ft': { category: 'torque', canonical: 'lbf·ft' },
    'lbft': { category: 'torque', canonical: 'lbf·ft' },
    'ft-lb': { category: 'torque', canonical: 'lbf·ft' },
    'ft-lbf': { category: 'torque', canonical: 'lbf·ft' },
    'lbf·in': { category: 'torque', canonical: 'lbf·in' },
    'lbin': { category: 'torque', canonical: 'lbf·in' },
    'in-lb': { category: 'torque', canonical: 'lbf·in' },
    'in-lbf': { category: 'torque', canonical: 'lbf·in' },
    // pressure
    'pa': { category: 'pressure', canonical: 'Pa' },
    'pascal': { category: 'pressure', canonical: 'Pa' },
    'kpa': { category: 'pressure', canonical: 'kPa' },
    'mpa': { category: 'pressure', canonical: 'MPa' },
    'psi': { category: 'pressure', canonical: 'psi' },
    'ksi': { category: 'pressure', canonical: 'psi', scale: 1000 },
    'bar': { category: 'pressure', canonical: 'bar' },
    // mass
    'kg': { category: 'mass', canonical: 'kg' },
    'kilogram': { category: 'mass', canonical: 'kg' },
    'kilograms': { category: 'mass', canonical: 'kg' },
    'g': { category: 'mass', canonical: 'g' },
    'gram': { category: 'mass', canonical: 'g' },
    'grams': { category: 'mass', canonical: 'g' },
    'lb': { category: 'mass', canonical: 'lb' },
    'lbs': { category: 'mass', canonical: 'lb' },
    'pound': { category: 'mass', canonical: 'lb' },
    'pounds': { category: 'mass', canonical: 'lb' },
    'oz': { category: 'mass', canonical: 'oz' },
    'ounce': { category: 'mass', canonical: 'oz' },
    'ounces': { category: 'mass', canonical: 'oz' },
    // temperature (separate, affine — not in `categories`)
    'c': { category: 'temperature', canonical: 'C' },
    '°c': { category: 'temperature', canonical: 'C' },
    'celsius': { category: 'temperature', canonical: 'C' },
    'f': { category: 'temperature', canonical: 'F' },
    '°f': { category: 'temperature', canonical: 'F' },
    'fahrenheit': { category: 'temperature', canonical: 'F' },
    'k': { category: 'temperature', canonical: 'K' },
    'kelvin': { category: 'temperature', canonical: 'K' }
  };

  function findUnitCategory(token) {
    if (!token) return null;
    const key = String(token).trim().toLowerCase();
    const entry = UNIT_ALIASES[key];
    if (!entry) return null;
    return { category: entry.category, canonical: entry.canonical };
  }

  /* ============================================================
   * 11. QUERY PARSER — route a typed string (SPEC §3 / §9.5).
   *    Canonical key shapes:
   *      metric:    "M<size>" or "M<size>x<pitch>"  (e.g. M6, M8x1.25)
   *      unified fractional (no leading #): "1/4-20"
   *      unified numbered (leading #):      "#10-24"
   * ============================================================ */

  // Normalize a unified-thread token into the canonical sizeKey shape
  // used by `threads`: fractional sizes carry no '#', numbered sizes do.
  function normalizeUnifiedSizeKey(rawSize) {
    const s = rawSize.trim();
    // Already has a '#': strip it, then re-decide based on shape.
    const stripped = s.charAt(0) === '#' ? s.slice(1) : s;
    // Numbered sizes are bare small integers (1-12 typically, no slash, no leading digit-fraction).
    // Fractional sizes contain a '/'.
    if (stripped.indexOf('/') !== -1) {
      return stripped; // fractional: no '#' prefix
    }
    return '#' + stripped; // numbered: '#' prefix
  }

  function parseQuery(raw) {
    if (raw === undefined || raw === null) return { kind: 'empty' };
    const trimmed = String(raw).trim();
    if (trimmed === '') return { kind: 'empty' };

    // --- Metric thread: M<num>[x<pitch>] ---
    let m = trimmed.match(/^M\s*(\d+(?:\.\d+)?)\s*(?:[xX×]\s*(\d+(?:\.\d+)?))?$/);
    if (m) {
      const sizeKey = 'M' + m[1];
      const pitch = m[2] !== undefined ? parseFloat(m[2]) : undefined;
      return { kind: 'thread', system: 'metric', sizeKey: sizeKey, pitch: pitch, raw: trimmed };
    }

    // --- Unified thread: [#]<size>-<tpi>  where size is N/N fraction or bare integer ---
    m = trimmed.match(/^#?\s*(\d+\/\d+|\d+)\s*-\s*(\d+)$/);
    if (m) {
      const sizeKey = normalizeUnifiedSizeKey(m[1]) + '-' + m[2];
      return { kind: 'thread', system: 'unified', sizeKey: sizeKey, pitch: undefined, raw: trimmed };
    }

    // --- Module words ---
    const lower = trimmed.toLowerCase();
    if (lower === 'beam') return { kind: 'module', module: 'beam' };
    if (lower === 'convert' || lower === 'conversion' || lower === 'converter') return { kind: 'module', module: 'convert' };
    if (lower === 'threads' || lower === 'thread') return { kind: 'module', module: 'threads' };
    if (lower === 'tap' || lower === 'tapdrill' || lower === 'tap drill') return { kind: 'module', module: 'tapDrill' };
    if (lower === 'clearance') return { kind: 'module', module: 'clearance' };

    // --- Conversion: "<number> <unit>" or "<number> <unit> to <unit>" ---
    m = trimmed.match(/^(-?\d+(?:\.\d+)?)\s*(°?[a-zA-Z"'·]+)\s*(?:to|->|=)\s*(°?[a-zA-Z"'·]+)$/);
    if (m) {
      const value = parseFloat(m[1]);
      const fromCat = findUnitCategory(m[2]);
      const toCat = findUnitCategory(m[3]);
      if (fromCat && toCat && fromCat.category === toCat.category) {
        return { kind: 'convert', value: value, from: fromCat.canonical, to: toCat.canonical, category: fromCat.category, raw: trimmed };
      }
      return { kind: 'convert', value: value, from: fromCat ? fromCat.canonical : m[2], to: toCat ? toCat.canonical : m[3], category: fromCat ? fromCat.category : null, raw: trimmed, error: 'Units must be in the same category.' };
    }
    // --- Conversion: "<number> <unit>" (no explicit target — caller picks default target) ---
    m = trimmed.match(/^(-?\d+(?:\.\d+)?)\s*(°?[a-zA-Z"'·]+)$/);
    if (m) {
      const value = parseFloat(m[1]);
      const cat = findUnitCategory(m[2]);
      if (cat) {
        return { kind: 'convert', value: value, from: cat.canonical, to: null, category: cat.category, raw: trimmed };
      }
    }

    // --- Fallback: substring match on thread labels ---
    const needle = lower;
    const candidates = threads.filter(function (t) {
      return t.label.toLowerCase().indexOf(needle) !== -1 || t.sizeKey.toLowerCase().indexOf(needle) !== -1;
    });
    if (candidates.length > 0) {
      return { kind: 'threadSearch', matches: candidates, raw: trimmed };
    }

    return { kind: 'none', raw: trimmed };
  }

  return {
    dataVersion: dataVersion,
    sourceRegistry: sourceRegistry,
    prov: prov,
    PITCH_DIA_OFFSET: PITCH_DIA_OFFSET,
    MINOR_DIA_OFFSET: MINOR_DIA_OFFSET,
    threads: threads,
    tapDrill: tapDrill,
    clearanceMetric: clearanceMetric,
    clearanceImperial: clearanceImperial,
    clearanceFor: clearanceFor,
    categories: categories,
    convert: convert,
    convertTemp: convertTemp,
    materials: materials,
    beamSource: beamSource,
    beam: beam,
    beamShape: beamShape,
    threadsFor: threadsFor,
    findUnitCategory: findUnitCategory,
    parseQuery: parseQuery
  };
})();
/* @pure-end */
</script>

<script>
/* ============================================================
 * UI LAYER — DOM-only IIFE. Consumes MTK exclusively. No data
 * values or provenance objects are defined here; everything
 * routes through the pure block.
 * ============================================================ */
(function () {
  'use strict';

  /* ---------- state (in-memory only, no storage APIs) ---------- */
  const state = {
    dark: false
  };

  let badgeSeq = 0;

  /* ---------- DOM refs ---------- */
  const searchInput = document.getElementById('searchInput');
  const resultsEl = document.getElementById('results');
  const chipsEl = document.getElementById('moduleChips');
  const darkToggle = document.getElementById('darkToggle');
  const footerVersion = document.getElementById('footerVersion');

  footerVersion.textContent = MTK.dataVersion;

  /* ============================================================
   * Registry pattern: domain -> {label, render}
   * The search-as-spine and module chips are both data-driven off
   * this map — no special-casing a domain by name elsewhere.
   * ============================================================ */
  const registry = {
    threads:   { label: 'Threads', seed: 'M6' },
    tapDrill:  { label: 'Tap drill', seed: 'M6' },
    clearance: { label: 'Clearance', seed: 'M6' },
    convert:   { label: 'Convert', seed: '' },
    beam:      { label: 'Beam', seed: 'beam' }
  };

  /* ============================================================
   * Small DOM helpers
   * ============================================================ */
  function h(tag, attrs, children) {
    const el = document.createElement(tag);
    if (attrs) {
      for (const k in attrs) {
        if (!Object.prototype.hasOwnProperty.call(attrs, k)) continue;
        if (k === 'class') el.className = attrs[k];
        else if (k === 'html') el.innerHTML = attrs[k];
        else if (k.indexOf('on') === 0 && typeof attrs[k] === 'function') el.addEventListener(k.slice(2), attrs[k]);
        else el.setAttribute(k, attrs[k]);
      }
    }
    if (children) {
      (Array.isArray(children) ? children : [children]).forEach(function (c) {
        if (c === null || c === undefined) return;
        if (typeof c === 'string') el.appendChild(document.createTextNode(c));
        else el.appendChild(c);
      });
    }
    return el;
  }

  function fmtNum(n, dp) {
    if (typeof n !== 'number' || !isFinite(n)) return '—';
    if (dp === undefined) return String(n);
    return n.toFixed(dp);
  }

  // Shared reduced-motion query: every JS-driven animation (rAF loops —
  // CSS transitions/keyframes are already zeroed globally by the
  // prefers-reduced-motion stylesheet rule) checks this and jumps
  // straight to the final frame when it matches.
  const REDUCE_MOTION_MQ = window.matchMedia('(prefers-reduced-motion: reduce)');

  // Minimal SVG element builder — the decorative/schematic diagrams
  // (beam bend, thread profile, caliper motif) are inline SVG built
  // with this, never data-bearing: no engineering value is ever set
  // as text inside an SVG built here without also being routed
  // through callout()/valRow() elsewhere on the card.
  const SVG_NS = 'http://www.w3.org/2000/svg';
  function se(tag, attrs, text) {
    const el = document.createElementNS(SVG_NS, tag);
    if (attrs) {
      for (const k in attrs) {
        if (Object.prototype.hasOwnProperty.call(attrs, k)) el.setAttribute(k, attrs[k]);
      }
    }
    if (text !== undefined) el.textContent = text;
    return el;
  }

  /* ============================================================
   * THE single badge-bearing render primitive (Gate G contract).
   * Every displayed value MUST go through callout() or valRow().
   * No other code path may print a bare number.
   * ============================================================ */

  // Tracks the one open popover so opening another (or tapping elsewhere)
  // closes it — keeps the dense tables calm, one source at a time.
  let openBadge = null;
  // Shared tap-to-close backdrop, shown only when a popover opens on a
  // narrow (<=520px) viewport where the popover is a fixed centered card.
  const NARROW_MQ = window.matchMedia('(max-width: 520px)');
  let badgeBackdrop = null;
  function showBackdrop() {
    if (!NARROW_MQ.matches) return;
    if (!badgeBackdrop) {
      badgeBackdrop = h('div', { class: 'source-detail-backdrop' });
      document.body.appendChild(badgeBackdrop);
    }
    badgeBackdrop.removeAttribute('hidden');
  }
  function hideBackdrop() {
    if (badgeBackdrop) badgeBackdrop.setAttribute('hidden', 'hidden');
  }
  function closeOpenBadge() {
    if (openBadge) { openBadge.close(); openBadge = null; }
    hideBackdrop();
  }
  document.addEventListener('click', function (e) {
    if (openBadge && !openBadge.wrap.contains(e.target)) closeOpenBadge();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && openBadge) { const b = openBadge.btn; closeOpenBadge(); b.focus(); }
  });

  // Renders a COMPACT tier chip — just the tier letter A–E in the layout-blue
  // (green when Verified-Against-Primary). The full citation (title · authority
  // · status · convention · notes) lives ONLY in the tap-expanded popover,
  // never inline (DESIGN_SYSTEM §8). `source` is a Provenance object or null.
  // Always shows a letter tier; a missing source renders the honest "!" chip.
  function renderBadge(source) {
    const wrap = h('span', { class: 'badge-wrap' });
    const id = 'src-detail-' + (++badgeSeq);

    let cls, letter, titleAttr;
    const detail = h('dl', { class: 'source-detail', id: id, hidden: 'hidden' });
    function row(term, value, prose) {
      if (!value) return;
      detail.appendChild(h('dt', null, term));
      detail.appendChild(h('dd', prose ? { class: 'dd-prose' } : null, String(value)));
    }

    if (!source) {
      cls = 'badge tier-error';
      letter = '!';
      titleAttr = 'No verified source — tap for detail';
      row('Source', 'No verified value');
      row('Why', 'No value is shown here without a cited source (SPEC §6). Tier and source are pending or intentionally omitted.', true);
    } else {
      const entry = MTK.sourceRegistry[source.sourceId];
      const verified = source.verificationStatus === 'Verified Against Primary';
      cls = 'badge ' + (verified ? 'tier-verified' : 'tier-secondary');
      letter = source.confidenceTier || '?';
      titleAttr = (entry ? entry.title : source.sourceId) + ' — tap for source';
      row('Source', entry ? (entry.title + ' — ' + entry.authority) : source.sourceId);
      row('Tier', 'Tier ' + (source.confidenceTier || '?'));
      row('Verification', source.verificationStatus);
      row('Convention', source.convention, true);
      row('Unit system', source.unitSystem);
      row('Notes', source.notes, true);
    }

    const badgeBtn = h('button', {
      type: 'button',
      class: cls,
      title: titleAttr,
      'aria-label': titleAttr,
      'aria-expanded': 'false',
      'aria-controls': id
    }, letter);

    function open() {
      closeOpenBadge();
      // On phones the popover is a fixed, viewport-centered card (see CSS
      // @media max-width:520px) — anchoring/edge-flipping does not apply, so
      // we skip it and raise the tap-to-close backdrop. On wider viewports
      // the popover stays anchored beside the chip; flip it toward the right
      // edge when the chip sits past the viewport midline so it never crosses
      // the right edge (the left edge is covered by the default left:0).
      if (NARROW_MQ.matches) {
        wrap.classList.remove('detail-right');
        showBackdrop();
      } else {
        const r = badgeBtn.getBoundingClientRect();
        wrap.classList.toggle('detail-right', r.left > window.innerWidth * 0.5);
      }
      detail.removeAttribute('hidden');
      badgeBtn.setAttribute('aria-expanded', 'true');
      openBadge = { wrap: wrap, btn: badgeBtn, close: function () {
        detail.setAttribute('hidden', 'hidden');
        badgeBtn.setAttribute('aria-expanded', 'false');
      } };
    }
    badgeBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      if (detail.hasAttribute('hidden')) open();
      else closeOpenBadge();
    });

    wrap.appendChild(badgeBtn);
    wrap.appendChild(detail);
    return wrap;
  }

  // The tolerance-callout signature element. EVERY primary value in the
  // app renders through this (or the inline valRow() below for table
  // cells) — both call renderBadge() internally, so there is exactly
  // one path from "a number" to "a number with a source badge".
  function callout(opts) {
    // opts: { value, unit, label, source, dp, errorText, hero }
    // hero: render as the single bold signature dimension (one per result),
    //       at the top of the type scale, with an inline copy affordance.
    const wrap = h('div', { class: 'callout' + (opts.hero ? ' callout-hero' : '') + (opts.errorText ? ' callout-error' : '') });
    const dimLine = h('div', { class: 'dim-line' });
    const box = h('span', { class: 'dim-box' });
    if (opts.errorText) {
      box.textContent = opts.errorText;
    } else {
      const numText = document.createTextNode(fmtNum(opts.value, opts.dp));
      box.appendChild(numText);
      if (opts.unit) box.appendChild(h('span', { class: 'dim-unit' }, opts.unit));
      // Hero count-up: a brief (~250ms) odometer confirming a fresh
      // result. The FINAL frame always matches fmtNum(value, dp) exactly
      // — this is presentation-only motion on a value that is already
      // rendered in full precision; it never substitutes for it.
      if (opts.hero && typeof opts.value === 'number' && isFinite(opts.value)) {
        countUp(numText, opts.value, opts.dp);
      }
    }
    dimLine.appendChild(box);
    wrap.appendChild(dimLine);

    const meta = h('div', { class: 'callout-meta' });
    if (opts.label) meta.appendChild(h('span', { class: 'callout-label' }, opts.label));
    if (!opts.errorText) meta.appendChild(renderBadge(opts.source));
    else meta.appendChild(renderBadge(null));
    if (opts.hero && !opts.errorText && typeof opts.value === 'number' && isFinite(opts.value)) {
      meta.appendChild(copyInline(fmtNum(opts.value, opts.dp) + (opts.unit ? ' ' + opts.unit : '')));
    }
    wrap.appendChild(meta);
    return wrap;
  }

  // Brief odometer count-up for the hero callout value (~250ms, eased).
  // Disabled under prefers-reduced-motion — the final value is set
  // immediately, no intermediate frames.
  function countUp(textNode, target, dp) {
    if (REDUCE_MOTION_MQ.matches) { textNode.nodeValue = fmtNum(target, dp); return; }
    const start = 0;
    const t0 = performance.now();
    const dur = 250;
    function frame(now) {
      const t = Math.min(1, (now - t0) / dur);
      const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
      textNode.nodeValue = fmtNum(start + (target - start) * eased, dp);
      if (t < 1) requestAnimationFrame(frame);
      else textNode.nodeValue = fmtNum(target, dp);
    }
    requestAnimationFrame(frame);
  }

  // Compact copy affordance for the hero callout (confirms understanding,
  // ≤160ms, no layout shift), sized for the callout meta row.
  function copyInline(text) {
    const btn = h('button', { type: 'button', class: 'callout-copy', 'aria-label': 'Copy ' + text }, 'Copy');
    btn.addEventListener('click', function () {
      const done = function () {
        btn.textContent = 'Copied';
        btn.classList.add('copied');
        setTimeout(function () { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1200);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done, done);
      } else { done(); }
    });
    return btn;
  }

  // Compact inline value-with-chip for table rows. The tier chip rides the
  // value (one chip per value); there is no separate source column. Still
  // routes every number through renderBadge() — the Gate G contract.
  function valRow(value, unit, dp, source) {
    const wrap = h('span', { class: 'val-cell' });
    if (value === null || value === undefined) {
      wrap.appendChild(h('span', { class: 'no-value' }, ['No verified value', renderBadge(null)]));
      return wrap;
    }

  /* ============================================================
   * Thread cross-section schematic — a couple of 60°-V thread teeth
   * with dimension leaders to major/pitch/minor Ø and pitch P.
   * Symbols only (d, d₂, d₁, P); the real cited numbers stay in the
   * badged callout/table below. Same schematic for every thread —
   * it is not parametrized by the record, so it never needs its own
   * source (there is no value here to cite).
   * ============================================================ */
  function threadSchematicSvg() {
    const svg = se('svg', {
      viewBox: '0 0 260 118', class: 'thread-svg', role: 'img',
      'aria-label': 'Thread profile schematic: major, pitch, and minor diameter with pitch P'
    });
    const leftX = 74, toothW = 30, periods = 6;
    const majorY = 16, pitchY = 44, minorY = 72;
    const rightX = leftX + toothW * periods;

    // reference lines (major / pitch / minor), dashed and quiet.
    svg.appendChild(se('line', { x1: leftX - 16, y1: majorY, x2: rightX + 12, y2: majorY, stroke: 'var(--rule)', 'stroke-width': 1, 'stroke-dasharray': '2,2' }));
    svg.appendChild(se('line', { x1: leftX - 16, y1: pitchY, x2: rightX + 12, y2: pitchY, stroke: 'var(--layout-blue)', 'stroke-width': 1, 'stroke-dasharray': '3,2' }));
    svg.appendChild(se('line', { x1: leftX - 16, y1: minorY, x2: rightX + 12, y2: minorY, stroke: 'var(--rule)', 'stroke-width': 1, 'stroke-dasharray': '2,2' }));

    // 60°-V thread teeth zigzag, major (peak) to minor (root).
    let d = 'M ' + leftX + ' ' + majorY;
    for (let i = 0; i < periods; i++) {
      const x = leftX + i * toothW;
      d += ' L ' + (x + toothW / 2).toFixed(1) + ' ' + minorY;
      d += ' L ' + (x + toothW).toFixed(1) + ' ' + majorY;
    }
    svg.appendChild(se('path', { d: d, fill: 'none', stroke: 'var(--ink)', 'stroke-width': 2, 'stroke-linejoin': 'round' }));

    // dimension leaders + symbol labels, left side.
    function dimLabel(y, label) {
      svg.appendChild(se('line', { x1: 22, y1: y, x2: leftX - 20, y2: y, stroke: 'var(--graphite)', 'stroke-width': 1 }));
      svg.appendChild(se('line', { x1: 22, y1: y - 4, x2: 22, y2: y + 4, stroke: 'var(--graphite)', 'stroke-width': 1 }));
      svg.appendChild(se('text', { x: 8, y: y + 4, class: 'thread-symbol', 'font-size': 13, fill: 'var(--graphite)' }, label));
    }
    dimLabel(majorY, 'd');
    dimLabel(pitchY, 'd₂');
    dimLabel(minorY, 'd₁');

    // pitch P dimension between two adjacent crests, bottom.
    const pY = minorY + 22, p1 = leftX, p2 = leftX + toothW;
    svg.appendChild(se('line', { x1: p1, y1: pY, x2: p2, y2: pY, stroke: 'var(--layout-blue)', 'stroke-width': 1 }));
    svg.appendChild(se('line', { x1: p1, y1: pY - 4, x2: p1, y2: pY + 4, stroke: 'var(--layout-blue)', 'stroke-width': 1 }));
    svg.appendChild(se('line', { x1: p2, y1: pY - 4, x2: p2, y2: pY + 4, stroke: 'var(--layout-blue)', 'stroke-width': 1 }));
    svg.appendChild(se('text', { x: (p1 + p2) / 2, y: pY + 15, 'text-anchor': 'middle', class: 'thread-symbol', 'font-size': 13, fill: 'var(--layout-blue)' }, 'P'));

    return svg;
  }

  /* ============================================================
   * Combined fastener card (F-001): thread + tap drill + clearance
   * ============================================================ */
  function renderFastenerCard(sizeKey, system, pitch) {
    const matches = MTK.threadsFor(sizeKey, system, pitch);
    if (matches.length === 0) {
      renderNoMatch(sizeKey);
      return;
    }
    const frag = document.createDocumentFragment();

    matches.forEach(function (thread) {
      const gdp = thread.unit === 'in' ? 4 : 3; // geometry decimal places
      const tdp = thread.unit === 'in' ? 4 : 2; // tap-drill decimal places
      const card = h('div', { class: 'card' });
      card.appendChild(h('div', { class: 'card-head' }, [
        h('span', { class: 'badge-key' }, thread.label),
        h('span', { class: 'card-series' }, thread.series)
      ]));
      card.appendChild(sourceHint());
      card.appendChild(h('div', { class: 'thread-schematic' }, threadSchematicSvg()));

      // HERO: the tap-drill (~75%) is the decision the user came for
      // ("what drill for this tap"). It is the ONE bold callout per card;
      // everything else on the card is quiet tabular data.
      const td = MTK.tapDrill(thread);
      if (td.result) {
        card.appendChild(callout({
          value: td.result.pct75, unit: thread.unit, dp: tdp,
          label: 'Tap drill · ~75% engagement', source: td.source, hero: true
        }));
      } else {
        card.appendChild(h('div', { class: 'no-value-block' }, [td.notes || 'No verified value', renderBadge(null)]));
      }

      // Quiet supporting data: geometry + the ~50% tap drill, as a table.
      const geomSection = h('div', { class: 'module-section' });
      geomSection.appendChild(h('h2', null, 'Thread geometry'));
      const geomTable = h('table', { class: 'val-table' });
      geomTable.appendChild(h('thead', null, h('tr', null, [
        h('th', null, 'Dimension'), h('th', { class: 'col-val' }, 'Value')
      ])));
      const geomBody = h('tbody');
      function geomRow(label, value, dp, source) {
        geomBody.appendChild(h('tr', null, [
          h('td', { class: 'td-label' }, label),
          h('td', { class: 'td-val' }, valRow(value, thread.unit, dp, source))
        ]));
      }
      geomRow('Major Ø', thread.majorDia, gdp, thread.provenance);
      geomRow('Pitch Ø', thread.pitchDia, gdp, thread.provenance);
      geomRow('Minor Ø', thread.minorDia, gdp, thread.provenance);
      geomRow('Pitch', thread.pitch, gdp, thread.provenance);
      if (td.result) geomRow('Tap drill · ~50%', td.result.pct50, tdp, td.source);
      geomTable.appendChild(geomBody);
      geomSection.appendChild(geomTable);
      if (td.result && td.source && td.source.notes) {
        geomSection.appendChild(h('div', { class: 'formula-box' }, td.source.notes));
      }
      card.appendChild(geomSection);

      // Clearance hole — quiet table.
      const clSection = h('div', { class: 'module-section' });
      clSection.appendChild(h('h2', null, 'Clearance hole'));
      const cl = MTK.clearanceFor(thread.sizeKey, thread.system === 'metric' ? 'metric' : 'imperial');
      if (cl.close !== null) {
        const dp = cl.unit === 'in' ? 3 : 1;
        const clTable = h('table', { class: 'val-table' });
        clTable.appendChild(h('thead', null, h('tr', null, [
          h('th', null, 'Fit'), h('th', { class: 'col-val' }, 'Hole Ø')
        ])));
        const clBody = h('tbody');
        [['Close', cl.close], ['Normal', cl.normal], ['Loose', cl.loose]].forEach(function (r) {
          clBody.appendChild(h('tr', null, [
            h('td', { class: 'td-label' }, r[0]),
