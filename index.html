  /* ============================================================
   * Converter module (live, no submit)
   * ============================================================ */
  function renderConvertModule(prefill) {
    const card = h('div', { class: 'card' });
    card.appendChild(h('h2', null, 'Convert'));
    card.appendChild(sourceHint());

    const catSelect = h('select', { id: 'convCategory' });
    Object.keys(MTK.categories).concat(['temperature']).forEach(function (catKey) {
      catSelect.appendChild(h('option', { value: catKey }, catKey.charAt(0).toUpperCase() + catKey.slice(1)));
    });

    const fromSelect = h('select', { id: 'convFrom' });
    const toSelect = h('select', { id: 'convTo' });
    const valueInput = h('input', { type: 'text', inputmode: 'decimal', id: 'convValue', value: '1', class: 'mono' });

    function unitsFor(catKey) {
      if (catKey === 'temperature') return ['C', 'F', 'K'];
      return Object.keys(MTK.categories[catKey].units);
    }

    function populateUnits(catKey, fromDefault, toDefault) {
      const units = unitsFor(catKey);
      fromSelect.replaceChildren.apply(fromSelect, units.map(function (u) { return h('option', { value: u }, u); }));
      toSelect.replaceChildren.apply(toSelect, units.map(function (u) { return h('option', { value: u }, u); }));
      fromSelect.value = fromDefault && units.indexOf(fromDefault) !== -1 ? fromDefault : units[0];
      toSelect.value = toDefault && units.indexOf(toDefault) !== -1 ? toDefault : (units[1] || units[0]);
    }

    const initCat = (prefill && prefill.category) || 'length';
    catSelect.value = initCat;
    populateUnits(initCat, prefill && prefill.from, prefill && prefill.to);
    if (prefill && typeof prefill.value === 'number') valueInput.value = String(prefill.value);

    const outputWrap = h('div', { id: 'convOutput' });

    function recompute() {
      const catKey = catSelect.value;
      const from = fromSelect.value;
      const to = toSelect.value;
      const raw = valueInput.value.trim();
      const value = raw === '' ? NaN : parseFloat(raw);
      outputWrap.replaceChildren();
      if (isNaN(value)) {
        outputWrap.appendChild(callout({ errorText: 'Enter a number', label: 'Result' }));
        return;
      }
      let res;
      if (catKey === 'temperature') {
        res = MTK.convertTemp(value, from, to);
      } else {
        res = MTK.convert(value, from, to, catKey);
      }
      if (res.result === null) {
        outputWrap.appendChild(callout({ errorText: 'No verified value', label: res.notes || '' }));
        return;
      }
      const dp = catKey === 'temperature' ? 2 : 6;
      const out = callout({ value: res.result, unit: to, dp: dp, label: from + ' → ' + to, source: res.source, hero: true });
      outputWrap.appendChild(out);
      if (res.formula) outputWrap.appendChild(h('div', { class: 'formula-box' }, res.formula));
    }

    catSelect.addEventListener('change', function () { populateUnits(catSelect.value); recompute(); });
    fromSelect.addEventListener('change', recompute);
    toSelect.addEventListener('change', recompute);
    valueInput.addEventListener('input', recompute);

    const grid = h('div', { class: 'grid-2' }, [
      h('div', { class: 'field' }, [h('label', { for: 'convCategory' }, 'Category'), catSelect]),
      h('div', { class: 'field' }, [h('label', { for: 'convValue' }, 'Value'), valueInput]),
      h('div', { class: 'field' }, [h('label', { for: 'convFrom' }, 'From'), fromSelect]),
      h('div', { class: 'field' }, [h('label', { for: 'convTo' }, 'To'), toSelect])
    ]);
    card.appendChild(grid);
    card.appendChild(outputWrap);
    resultsEl.replaceChildren(card);
    recompute();
  }

  /* ============================================================
   * Beam diagram — animated cantilever SVG (headline motion feature).
   * Draws the fixed wall (hatched), the beam bent to the REAL
   * cantilever curve shape from MTK.beamShape() — normalized so the
   * visual tip deflection is always ~12% of the drawn beam length,
   * regardless of the true computed magnitude — and a load indicator
   * (arrow for point, distributed band for UDL). Symbols only (L, δ,
   * P/w); the real cited deflection stays in the badged hero callout
   * below. The bend tweens over ~250ms via requestAnimationFrame
   * (not CSS) so curves of different shape can interpolate smoothly;
   * disabled under prefers-reduced-motion (final shape drawn instantly).
   * ============================================================ */
  function beamDiagramBuilder() {
    const W = 320, H = 150;
    const wallX = 34, baseY = 62, beamLen = 246, N = 28;
    const tipDroopFrac = 0.12; // fixed fraction of drawn length — always visible
    const tipDroop = beamLen * tipDroopFrac;

    const svg = se('svg', { viewBox: '0 0 ' + W + ' ' + H, class: 'beam-svg', role: 'img' });

    // Fixed-support hatching, left edge.
    const wallG = se('g', { 'aria-hidden': 'true' });
    wallG.appendChild(se('line', { x1: wallX, y1: baseY - 34, x2: wallX, y2: baseY + 34, stroke: 'var(--ink)', 'stroke-width': 2 }));
    for (let i = -3; i <= 3; i++) {
      const y = baseY + i * 10;
      wallG.appendChild(se('line', { x1: wallX - 10, y1: y + 10, x2: wallX, y2: y, stroke: 'var(--rule)', 'stroke-width': 1.5 }));
    }
    svg.appendChild(wallG);

    // L dimension line, under the beam.
    const dimY = baseY + 46;
    const dimG = se('g', { 'aria-hidden': 'true' });
    dimG.appendChild(se('line', { x1: wallX, y1: dimY, x2: wallX + beamLen, y2: dimY, stroke: 'var(--rule)', 'stroke-width': 1 }));
    dimG.appendChild(se('line', { x1: wallX, y1: dimY - 5, x2: wallX, y2: dimY + 5, stroke: 'var(--rule)', 'stroke-width': 1 }));
    dimG.appendChild(se('line', { x1: wallX + beamLen, y1: dimY - 5, x2: wallX + beamLen, y2: dimY + 5, stroke: 'var(--rule)', 'stroke-width': 1 }));
    dimG.appendChild(se('text', { x: wallX + beamLen / 2, y: dimY + 15, 'text-anchor': 'middle', class: 'beam-symbol', 'font-size': 12, fill: 'var(--graphite)' }, 'L'));
    svg.appendChild(dimG);

    // Load indicator group — rebuilt when load type changes.
    const loadG = se('g', { 'aria-hidden': 'true' });
    svg.appendChild(loadG);

    function arrow(x1, y1, x2, y2, color) {
      const g = se('g');
      g.appendChild(se('line', { x1: x1, y1: y1, x2: x2, y2: y2, stroke: color, 'stroke-width': 1.5 }));
      g.appendChild(se('path', { d: 'M ' + (x2 - 3) + ' ' + (y2 - 5) + ' L ' + x2 + ' ' + y2 + ' L ' + (x2 + 3) + ' ' + (y2 - 5), fill: 'none', stroke: color, 'stroke-width': 1.5, 'stroke-linecap': 'round' }));
      return g;
    }

    function buildLoadIndicator(loadType) {
      loadG.replaceChildren();
      if (loadType === 'udl') {
        const bandY = baseY - 28;
        loadG.appendChild(se('line', { x1: wallX, y1: bandY, x2: wallX + beamLen, y2: bandY, stroke: 'var(--caution)', 'stroke-width': 1.5 }));
        const count = 6;
        for (let i = 0; i <= count; i++) {
          const x = wallX + (beamLen * i) / count;
          loadG.appendChild(arrow(x, bandY, x, baseY - 6, 'var(--caution)'));
        }
        loadG.appendChild(se('text', { x: wallX + beamLen / 2, y: bandY - 7, 'text-anchor': 'middle', class: 'beam-symbol', 'font-size': 12, fill: 'var(--caution)' }, 'w'));
      } else {
        const x = wallX + beamLen;
        loadG.appendChild(arrow(x, baseY - 40, x, baseY - 6, 'var(--caution)'));
        loadG.appendChild(se('text', { x: x + 6, y: baseY - 34, class: 'beam-symbol', 'font-size': 12, fill: 'var(--caution)' }, 'P'));
      }
    }

    // Animated beam curve (path) + tip marker/leader for the δ label.
    const beamPath = se('path', { class: 'beam-curve', fill: 'none', stroke: 'var(--layout-blue)', 'stroke-width': 3, 'stroke-linecap': 'round' });
    svg.appendChild(beamPath);
    const tipDot = se('circle', { r: 3, fill: 'var(--layout-blue)' });
    svg.appendChild(tipDot);
    const tipLeader = se('line', { stroke: 'var(--graphite)', 'stroke-width': 1, 'stroke-dasharray': '2,2' });
    svg.appendChild(tipLeader);
    const tipLabel = se('text', { class: 'beam-symbol', 'font-size': 13, fill: 'var(--graphite)' }, 'δ');
    svg.appendChild(tipLabel);

    function pointsToPath(pts) {
      return pts.map(function (p, i) { return (i === 0 ? 'M ' : 'L ') + p[0].toFixed(2) + ' ' + p[1].toFixed(2); }).join(' ');
    }
    function pixelPointsFor(loadType) {
      return MTK.beamShape(loadType, N).map(function (p) {
        return [wallX + p[0] * beamLen, baseY + p[1] * tipDroop];
      });
    }
    function renderAt(pts) {
      beamPath.setAttribute('d', pointsToPath(pts));
      const tip = pts[pts.length - 1];
      tipDot.setAttribute('cx', tip[0]);
      tipDot.setAttribute('cy', tip[1]);
      tipLeader.setAttribute('x1', tip[0]);
      tipLeader.setAttribute('y1', tip[1]);
      tipLeader.setAttribute('x2', tip[0] + 12);
      tipLeader.setAttribute('y2', tip[1] - 16);
      tipLabel.setAttribute('x', tip[0] + 14);
      tipLabel.setAttribute('y', tip[1] - 18);
    }

    let currentPts = null;
    let rafId = null;

    function update(loadType) {
      const kind = loadType === 'udl' ? 'udl' : 'point';
      svg.setAttribute('aria-label', 'Cantilever beam, schematic — ' + (kind === 'udl' ? 'uniformly distributed load w' : 'point load P at the tip') + '; symbols only, see the cited value below.');
      buildLoadIndicator(kind);
      const target = pixelPointsFor(kind);
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      if (!currentPts || REDUCE_MOTION_MQ.matches) {
        currentPts = target;
        renderAt(currentPts);
        return;
      }
      const start = currentPts.map(function (p) { return p.slice(); });
      const t0 = performance.now();
      const dur = 250;
      function frame(now) {
        const t = Math.min(1, (now - t0) / dur);
        const eased = 1 - Math.pow(1 - t, 3);
        renderAt(start.map(function (p, i) {
          return [p[0] + (target[i][0] - p[0]) * eased, p[1] + (target[i][1] - p[1]) * eased];
        }));
        if (t < 1) { rafId = requestAnimationFrame(frame); }
        else { currentPts = target; rafId = null; }
      }
      rafId = requestAnimationFrame(frame);
    }

    return { svg: svg, update: update };
  }

  /* ============================================================
   * Beam calculator module (interactive)
   * ============================================================ */
  function renderBeamModule() {
    const card = h('div', { class: 'card' });
    card.appendChild(h('h2', null, 'Cantilever beam deflection'));
    card.appendChild(sourceHint());

    const lengthInput = h('input', { type: 'text', inputmode: 'decimal', value: '1000', class: 'mono', id: 'beamLength' });
    const matSelect = h('select', { id: 'beamMaterial' });
    MTK.materials.forEach(function (m) { matSelect.appendChild(h('option', { value: m.key }, m.label)); });
    const sectionTypeRow = h('div', { class: 'radio-row' }, [
      h('label', { class: 'radio-chip' }, [h('input', { type: 'radio', name: 'sectionType', value: 'rect', checked: 'checked' }), 'Rectangular']),
      h('label', { class: 'radio-chip' }, [h('input', { type: 'radio', name: 'sectionType', value: 'round' }), 'Round'])
    ]);
    const bInput = h('input', { type: 'text', inputmode: 'decimal', value: '50', class: 'mono', id: 'beamWidthB' });
    const hInput = h('input', { type: 'text', inputmode: 'decimal', value: '100', class: 'mono', id: 'beamHeightH' });
    const dInput = h('input', { type: 'text', inputmode: 'decimal', value: '20', class: 'mono', id: 'beamDiaD' });
    const rectFields = h('div', { class: 'grid-2' }, [
      h('div', { class: 'field' }, [h('label', { for: 'beamWidthB' }, 'b (mm)'), bInput]),
      h('div', { class: 'field' }, [h('label', { for: 'beamHeightH' }, 'h (mm)'), hInput])
    ]);
    const roundFields = h('div', { class: 'field' }, [h('label', { for: 'beamDiaD' }, 'd (mm)'), dInput]);
    roundFields.style.display = 'none';

    const loadTypeRow = h('div', { class: 'radio-row' }, [
      h('label', { class: 'radio-chip' }, [h('input', { type: 'radio', name: 'loadType', value: 'point', checked: 'checked' }), 'Point (tip)']),
      h('label', { class: 'radio-chip' }, [h('input', { type: 'radio', name: 'loadType', value: 'udl' }), 'UDL (total)'])
    ]);
    const magInput = h('input', { type: 'text', inputmode: 'decimal', value: '1000', class: 'mono', id: 'beamMagnitude' });

    sectionTypeRow.addEventListener('change', function () {
      const v = sectionTypeRow.querySelector('input:checked').value;
      rectFields.style.display = v === 'rect' ? '' : 'none';
      roundFields.style.display = v === 'round' ? '' : 'none';
      recompute();
    });
    [lengthInput, matSelect, bInput, hInput, dInput, magInput].forEach(function (el) {
      el.addEventListener('input', recompute);
      el.addEventListener('change', recompute);
    });
    loadTypeRow.addEventListener('change', recompute);

    const outputWrap = h('div', { id: 'beamOutput' });
    // Headline diagram sits above the result — built once and updated
    // in place (not recreated) each recompute so the bend can tween.
    const beamDiagram = beamDiagramBuilder();
    const diagramWrap = h('div', { class: 'beam-diagram' }, beamDiagram.svg);

    function recompute() {
      const length = parseFloat(lengthInput.value) / 1000; // mm -> m
      const matKey = matSelect.value;
      const mat = MTK.materials.find(function (m) { return m.key === matKey; });
      const sectionType = sectionTypeRow.querySelector('input:checked').value;
      const loadType = loadTypeRow.querySelector('input:checked').value;
      const magnitude = parseFloat(magInput.value);

      beamDiagram.update(loadType);

      let section;
      if (sectionType === 'rect') {
        section = { type: 'rect', b: parseFloat(bInput.value) / 1000, h: parseFloat(hInput.value) / 1000 };
      } else {
        section = { type: 'round', d: parseFloat(dInput.value) / 1000 };
      }

      const res = MTK.beam({ length: length, E: mat ? mat.E : NaN, section: section, load: loadType, magnitude: magnitude });
      outputWrap.replaceChildren();
      if (res.error) {
        outputWrap.appendChild(callout({ errorText: res.error, label: 'Deflection' }));
        return;
      }
      // HERO: tip deflection is the primary decision for a cantilever check.
      outputWrap.appendChild(callout({
        value: res.result.deflection * 1000, unit: 'mm', dp: 4,
        label: 'Tip deflection', source: res.source, hero: true
      }));
      // Quiet supporting outputs as a table.
      const outTable = h('table', { class: 'val-table' });
      outTable.appendChild(h('thead', null, h('tr', null, [
        h('th', null, 'Output'), h('th', { class: 'col-val' }, 'Value')
      ])));
      const outBody = h('tbody');
      [
        ['Max bending stress', res.result.stress / 1e6, 'MPa', 3],
        ['Moment', res.result.moment, 'N·m', 3],
        ['I (second moment)', res.result.I * 1e12, 'mm⁴', 1]
      ].forEach(function (r) {
        outBody.appendChild(h('tr', null, [
          h('td', { class: 'td-label' }, r[0]),
          h('td', { class: 'td-val' }, valRow(r[1], r[2], r[3], res.source))
        ]));
      });
      outTable.appendChild(outBody);
      outputWrap.appendChild(outTable);
      outputWrap.appendChild(h('div', { class: 'formula-box' }, res.formula));
    }

    card.appendChild(h('div', { class: 'field' }, [h('label', { for: 'beamLength' }, 'Length (mm)'), lengthInput]));
    card.appendChild(h('div', { class: 'field' }, [h('label', { for: 'beamMaterial' }, 'Material'), matSelect]));
    card.appendChild(h('div', { class: 'field' }, [h('label', null, 'Section'), sectionTypeRow]));
    card.appendChild(rectFields);
    card.appendChild(roundFields);
    card.appendChild(h('div', { class: 'field' }, [h('label', null, 'Load type'), loadTypeRow]));
    card.appendChild(h('div', { class: 'field' }, [h('label', { for: 'beamMagnitude' }, 'Magnitude (N or N total)'), magInput]));
    card.appendChild(diagramWrap);
    card.appendChild(outputWrap);

    resultsEl.replaceChildren(card);
    recompute();
  }

  /* ============================================================
   * Search routing — runSearch() is the single entry point that
   * drives the home-screen "type and see" interaction (SPEC §3).
   * ============================================================ */
  function runSearch(raw) {
    const q = MTK.parseQuery(raw);
    switch (q.kind) {
      case 'empty':
        renderEmptyState();
        break;
      case 'thread':
        renderFastenerCard(q.sizeKey, q.system, q.pitch);
        break;
      case 'threadSearch':
        renderThreadSearch(q.matches, q.raw);
        break;
      case 'convert':
        renderConvertModule({ category: q.category, from: q.from, to: q.to, value: q.value });
        break;
      case 'module':
        if (q.module === 'beam') renderBeamModule();
        else if (q.module === 'convert') renderConvertModule();
        else renderEmptyState();
        break;
      case 'none':
      default:
        renderNoMatch(q.raw || raw);
        break;
    }
  }

  searchInput.addEventListener('input', function () {
    runSearch(searchInput.value);
  });

  /* ============================================================
   * In-browser self-test, mirrors tests/calculators.test.mjs.
   * Reachable at #selftest. Per PROJECT_MEMORY: hash-only nav does
   * not re-run scripts, so this also runs on load if the hash is
   * already present, and exposes a manual re-run button.
   * ============================================================ */
  function runSelfTest() {
    const lines = [];
    let pass = 0, fail = 0;
    function ok(cond, msg) {
      if (cond) { pass++; } else { fail++; lines.push('FAIL: ' + msg); }
    }
    const m6 = MTK.threads.find(function (t) { return t.sizeKey === 'M6' && t.pitch === 1.0 && t.system === 'metric'; });
    ok(m6 && m6.pitchDia === 5.350, 'M6 pitchDia 5.350');
    ok(m6 && m6.minorDia === 4.917, 'M6 minorDia 4.917');
    const td = MTK.tapDrill(m6);
    ok(td.result.pct75 === 5.0, 'M6 tap drill 75% = 5.0');
    ok(td.result.pct50 === 5.35, 'M6 tap drill 50% = 5.35');
    const cl = MTK.clearanceFor('M6', 'metric');
    ok(cl.close === 6.4 && cl.normal === 6.6 && cl.loose === 7.0, 'M6 clearance 6.4/6.6/7.0');
    const conv = MTK.convert(1, 'in', 'mm', 'length');
    ok(Math.abs(conv.result - 25.4) < 1e-9, '1 in = 25.4 mm');
    ok(conv.source.confidenceTier === 'A', 'conversion is tier A');
    const beamRes = MTK.beam({ length: 1, E: 200e9, section: { type: 'rect', b: 0.05, h: 0.1 }, load: 'point', magnitude: 1000 });
    ok(!beamRes.error && Math.abs(beamRes.result.deflection - 0.0004) < 0.00002, 'beam deflection approx 0.4mm');
    ok(!!beamRes.source, 'beam result carries provenance');
    const badBeam = MTK.beam({ length: 0, E: 200e9, section: { type: 'round', d: 0.01 }, load: 'point', magnitude: 10 });
    ok(!!badBeam.error, 'beam rejects length <= 0');
    const p1 = MTK.parseQuery('M6');
    ok(p1.kind === 'thread' && p1.sizeKey === 'M6', 'parseQuery M6');
    const p2 = MTK.parseQuery('#10-24').sizeKey === MTK.parseQuery('10-24').sizeKey;
    ok(p2, '#10-24 and 10-24 resolve to same key');
    const p3 = MTK.parseQuery('1/4-20').sizeKey === MTK.parseQuery('#1/4-20').sizeKey;
    ok(p3, '1/4-20 and #1/4-20 resolve to same key');
    ok(MTK.parseQuery('').kind === 'empty', 'empty query -> empty kind');
    ok(MTK.parseQuery('beam').kind === 'module', '"beam" -> module kind');
    ok(MTK.parseQuery('10 mm to in').kind === 'convert', '"10 mm to in" -> convert kind');

    const summary = pass + ' passing, ' + fail + ' failing';
    const out = document.getElementById('selftest-out');
    if (out) out.textContent = summary + (lines.length ? '\n\n' + lines.join('\n') : '\n\nAll tests passed.');
    return { pass: pass, fail: fail, lines: lines };
  }

  function renderSelfTestPage() {
    const card = h('div', { class: 'card' });
    card.appendChild(h('h2', null, 'In-browser self-test'));
    const rerunBtn = h('button', { type: 'button', class: 'primary' }, 'Re-run tests');
    const out = h('pre', { id: 'selftest-out' }, 'Running...');
    rerunBtn.addEventListener('click', runSelfTest);
    card.appendChild(rerunBtn);
    card.appendChild(out);
    resultsEl.replaceChildren(card);
    runSelfTest();
  }

  function handleHash() {
    if (window.location.hash === '#selftest') {
      searchInput.value = '';
      renderSelfTestPage();
    }
  }
  window.addEventListener('hashchange', handleHash);

  /* ============================================================
   * Initial render
   * ============================================================ */
  if (window.location.hash === '#selftest') {
    renderSelfTestPage();
  } else {
    renderEmptyState();
  }
  searchInput.focus();
})();
</script>
</body>
</html>
