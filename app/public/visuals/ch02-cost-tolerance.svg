<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" font-family="Georgia, 'Times New Roman', serif">
  <rect width="520" height="360" fill="none"/>
  <!-- axes -->
  <line x1="80" y1="40" x2="80" y2="300" stroke="#111" stroke-width="1.6"/>
  <line x1="80" y1="300" x2="480" y2="300" stroke="#111" stroke-width="1.6"/>
  <!-- y ticks -->
  <g stroke="#111" stroke-width="1" font-size="12" fill="#111" text-anchor="end">
    <line x1="76" y1="80" x2="80" y2="80"/><text x="72" y="84">100</text>
    <line x1="76" y1="135" x2="80" y2="135"/><text x="72" y="139">75</text>
    <line x1="76" y1="190" x2="80" y2="190"/><text x="72" y="194">50</text>
    <line x1="76" y1="245" x2="80" y2="245"/><text x="72" y="249">25</text>
  </g>
  <!-- x ticks -->
  <g stroke="#111" stroke-width="1" font-size="12" fill="#111" text-anchor="middle">
    <line x1="160" y1="300" x2="160" y2="304"/><text x="160" y="320">0.1</text>
    <line x1="240" y1="300" x2="240" y2="304"/><text x="240" y="320">0.2</text>
    <line x1="320" y1="300" x2="320" y2="304"/><text x="320" y="320">0.3</text>
    <line x1="400" y1="300" x2="400" y2="304"/><text x="400" y="320">0.4</text>
    <line x1="470" y1="300" x2="470" y2="304"/><text x="470" y="320">0.5</text>
  </g>
  <!-- cost curve: steep at tight tolerance, flattens out -->
  <path d="M 108 55 C 130 120, 150 175, 175 205 C 210 245, 260 268, 320 280 C 380 289, 430 292, 472 294"
        fill="none" stroke="#b00020" stroke-width="2.6"/>
  <!-- axis labels -->
  <text x="280" y="348" font-size="14" fill="#111" text-anchor="middle">Tolerance (mm)  —  wider &#8594;</text>
  <text x="26" y="170" font-size="14" fill="#111" text-anchor="middle" transform="rotate(-90 26 170)">Relative cost</text>
  <text x="300" y="60" font-size="13" fill="#b00020" text-anchor="start" font-style="italic">tight = expensive</text>
</svg>
