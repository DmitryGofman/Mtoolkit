<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 430" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#111"/>
    </marker>
    <marker id="ahs" markerWidth="9" markerHeight="9" refX="0" refY="3" orient="auto">
      <path d="M7,0 L0,3 L7,6 Z" fill="#111"/>
    </marker>
  </defs>
  <style>
    .bar{fill:none;stroke:#111;stroke-width:2}
    .hole{fill:none;stroke:#111;stroke-width:1.6}
    .dim{stroke:#111;stroke-width:1;marker-start:url(#ahs);marker-end:url(#ah)}
    .ext{stroke:#888;stroke-width:0.8}
    .lbl{font-size:11px;fill:#111;text-anchor:middle}
    .title{font-size:15px;font-weight:bold;fill:#0a6a7a}
    .note{font-size:12px;fill:#b00020}
  </style>

  <!-- 8 holes at x = 75,140,205,270,335,400,465,530 -->
  <!-- ===== CHAIN (top) ===== -->
  <text x="20" y="26" class="title">שרשרת — chain</text>
  <rect x="45" y="62" width="510" height="52" class="bar"/>
  <g class="hole">
    <circle cx="75" cy="88" r="10"/><circle cx="140" cy="88" r="10"/><circle cx="205" cy="88" r="10"/>
    <circle cx="270" cy="88" r="10"/><circle cx="335" cy="88" r="10"/><circle cx="400" cy="88" r="10"/>
    <circle cx="465" cy="88" r="10"/><circle cx="530" cy="88" r="10"/>
  </g>
  <g class="ext">
    <line x1="75" y1="76" x2="75" y2="42"/><line x1="140" y1="76" x2="140" y2="42"/>
    <line x1="205" y1="76" x2="205" y2="42"/><line x1="270" y1="76" x2="270" y2="42"/>
    <line x1="335" y1="76" x2="335" y2="42"/><line x1="400" y1="76" x2="400" y2="42"/>
    <line x1="465" y1="76" x2="465" y2="42"/><line x1="530" y1="76" x2="530" y2="42"/>
  </g>
  <g class="dim">
    <line x1="75" y1="47" x2="140" y2="47"/><line x1="140" y1="47" x2="205" y2="47"/>
    <line x1="205" y1="47" x2="270" y2="47"/><line x1="270" y1="47" x2="335" y2="47"/>
    <line x1="335" y1="47" x2="400" y2="47"/><line x1="400" y1="47" x2="465" y2="47"/>
    <line x1="465" y1="47" x2="530" y2="47"/>
  </g>
  <g class="lbl">
    <text x="107" y="43">90</text><text x="172" y="43">90</text><text x="237" y="43">90</text>
    <text x="302" y="43">90</text><text x="367" y="43">90</text><text x="432" y="43">90</text>
    <text x="497" y="43">90</text>
  </g>
  <text x="45" y="146" class="note">7 מרווחים ±0.1 מצטברים → הקדח ה-8 נודד עד ±0.7</text>

  <!-- ===== BASELINE (bottom) ===== -->
  <text x="20" y="238" class="title">בסיס משותף — baseline</text>
  <rect x="45" y="272" width="510" height="52" class="bar"/>
  <g class="hole">
    <circle cx="75" cy="298" r="10"/><circle cx="140" cy="298" r="10"/><circle cx="205" cy="298" r="10"/>
    <circle cx="270" cy="298" r="10"/><circle cx="335" cy="298" r="10"/><circle cx="400" cy="298" r="10"/>
    <circle cx="465" cy="298" r="10"/><circle cx="530" cy="298" r="10"/>
  </g>
  <line x1="58" y1="272" x2="58" y2="420" stroke="#0a6a7a" stroke-width="1.6"/>
  <text x="58" y="268" class="lbl" fill="#0a6a7a">datum</text>
  <g class="ext">
    <line x1="75" y1="310" x2="75" y2="420"/><line x1="140" y1="310" x2="140" y2="408"/>
    <line x1="270" y1="310" x2="270" y2="396"/><line x1="400" y1="310" x2="400" y2="384"/>
    <line x1="530" y1="310" x2="530" y2="372"/>
  </g>
  <g class="dim">
    <line x1="58" y1="368" x2="75" y2="368"/>
    <line x1="58" y1="380" x2="140" y2="380"/>
    <line x1="58" y1="392" x2="270" y2="392"/>
    <line x1="58" y1="404" x2="400" y2="404"/>
    <line x1="58" y1="416" x2="530" y2="416"/>
  </g>
  <g class="lbl">
    <text x="100" y="365">90</text><text x="130" y="377">180</text><text x="195" y="389">360</text>
    <text x="260" y="401">540</text><text x="325" y="413">720</text>
  </g>
  <text x="360" y="360" class="note">כל קדח נמדד מהבסיס — אין הצטברות</text>
</svg>
